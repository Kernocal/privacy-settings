name: Release Current Version
on:
  workflow_dispatch:
    inputs:
      dryRun:
        default: false
        type: boolean
        description: Dry run

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml
    secrets: inherit

  submit:
    name: Submit
    runs-on: ubuntu-24.04
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Configure Git
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "GitHub Actions"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Version
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          pnpm dlx changelogen@latest --release $NEW_VERSION --output CHANGELOG.md
          echo "newVersion=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and Zip
        run: |
          pnpm run zip
          pnpm run zip-edge

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true

      - name: Commit and Push
        if: ${{ !inputs.dryRun }}
        run: |
          git add CHANGELOG.md
          git commit -am "chore(release): v$NEW_VERSION"
          git tag v$NEW_VERSION
          git push
          git push --tags
        env:
          NEW_VERSION: ${{ steps.version.outputs.newVersion }}

      - name: Release
        if: ${{ !inputs.dryRun }}
        run: pnpm dlx changelogen@latest gh release ${{ steps.version.outputs.newVersion }} --token ${{ github.token }}
        env:
          GH_TOKEN: ${{ github.token }}

      # Don't upload sources zip - it can contain .env files, which may include secrets
      - name: Upload ZIPs
        if: ${{ !inputs.dryRun }}
        run: gh release upload v${{ steps.version.outputs.newVersion }} .output/*.zip
        env:
          GH_TOKEN: ${{ github.token }}