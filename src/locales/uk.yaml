extension:
    name: Контроль конфіденційності
    description: Керуйте налаштуваннями конфіденційності браузера.
    description_chrome: Керуйте внутрішніми налаштуваннями конфіденційності Chrome.
    description_edge: Керуйте внутрішніми налаштуваннями конфіденційності Edge.
    chrome_name: Контроль конфіденційності Chrome
    edge_name: Контроль конфіденційності Edge
sidepanel:
    heading: Внутрішні налаштування конфіденційності браузера
    disclaimer: 'Застереження:'
    disclaimerText: "Це розширення не пов'язане з $1."
    managedText: Усі налаштування керуються в браузері за допомогою розширення browser.privacy API.
    learnMore: Дізнатися більше про browser.privacy API
    defaultLabel: 'За замовчуванням:'
    on: Увімк.
    off: Вимк.
settings:
    services:
        label: Сервіси
        description: 'Налаштування, які вмикають або вимикають функції, що потребують сторонніх мережевих сервісів, наданих $2 та вашим пошуковим провайдером за замовчуванням.'
        autofillAddressEnabled:
            label: Автозаповнення адреси
            description: 'Якщо ввімкнено, $1 пропонує автоматично заповнювати адреси та інші дані форм.'
        autofillCreditCardEnabled:
            label: Автозаповнення кредитної картки
            description: 'Якщо ввімкнено, $1 пропонує автоматично заповнювати форми кредитних карток.'
        passwordSavingEnabled:
            label: Збереження паролів
            description: 'Якщо ввімкнено, менеджер паролів запитає, чи хочете ви зберегти паролі.'
        searchSuggestEnabled:
            label: Пошукові підказки
            description: 'Якщо ввімкнено, $1 надсилає текст, який ви вводите в Omnibox, вашій пошуковій системі за замовчуванням, яка надає прогнози вебсайтів і пошукових запитів, що ймовірно є завершенням того, що ви вже ввели.'
        spellingServiceEnabled:
            label: Сервіс перевірки правопису
            description: 'Якщо ввімкнено, $1 використовує вебсервіс для допомоги у виправленні орфографічних помилок.'
        translationServiceEnabled:
            label: Сервіс перекладу
            description: 'Якщо ввімкнено, $1 пропонує перекладати сторінки, які написані мовою, якою ви не читаєте.'
        safeBrowsingEnabled:
            label: Безпечний перегляд
            description: 'Якщо ввімкнено, $1 робить усе можливе, щоб захистити вас від фішингу та шкідливого програмного забезпечення.'
        safeBrowsingExtendedReportingEnabled:
            label: Розширені звіти безпечного перегляду
            description: 'Якщо ввімкнено, $1 надсилатиме додаткову інформацію до $2, коли SafeBrowsing блокує сторінку, наприклад вміст заблокованої сторінки.'
        alternateErrorPagesEnabled:
            label: Альтернативні сторінки помилок
            description: 'Якщо ввімкнено, $1 використовує вебсервіс для допомоги у вирішенні помилок навігації.'
    websites:
        label: Вебсайти
        description: 'Налаштування, які визначають, яку інформацію $1 надає вебсайтам.'
        doNotTrackEnabled:
            label: Не відстежувати
            description: 'Якщо ввімкнено, $1 надсилає заголовок «Не відстежувати» (DNT: 1) з вашими запитами.'
        thirdPartyCookiesAllowed:
            label: Сторонні файли cookie дозволені
            description: 'Якщо вимкнено, $1 блокує встановлення файлів cookie сторонніми сайтами. Розширення не можуть увімкнути цей API у режимі Incognito, де сторонні файли cookie заблоковані і можуть бути дозволені лише на рівні окремого сайту. Якщо ви спробуєте встановити цей API на true у режимі Incognito, буде видано помилку. Примітка: окремі сайти все ще можуть мати доступ до сторонніх файлів cookie, коли цей API повертає false, якщо вони мають дійсний виняток або використовують Storage Access API.'
        hyperlinkAuditingEnabled:
            label: Аудит гіперпосилань
            description: 'Якщо ввімкнено, $1 надсилає аудит-запити на вимогу вебсайту (<a ping>).'
        protectedContentEnabled:
            label: Захищений вміст
            description: 'Якщо ввімкнено, $1 надає унікальний ідентифікатор плагінам для відтворення захищеного вмісту.'
        referrersEnabled:
            label: Реферери
            description: 'Якщо ввімкнено, $1 надсилає заголовки referer з вашими запитами.'
    network:
        label: Мережа
        description: "Налаштування, які впливають на обробку мережевих з'єднань $1 загалом."
        webRTCIPHandlingPolicy:
            label: Політика обробки IP-адрес WebRTC
            description: 'Дозволяє користувачам визначати компроміс між продуктивністю та конфіденційністю медіа, що впливає на маршрутизацію трафіку WebRTC та обсяг розкритої інформації про локальну адресу.'
        networkPredictionEnabled:
            label: Прогнозування мережі
            description: "Якщо ввімкнено, $1 намагається прискорити перегляд вебсторінок шляхом попереднього визначення DNS-записів та випереджувального відкриття TCP і SSL з'єднань із серверами. Це налаштування впливає лише на дії внутрішнього сервісу прогнозування $1. Воно не впливає на попереднє завантаження або попереднє з'єднання, ініційовані вебсторінкою."
    webrtc:
        default: За замовчуванням
        default_public_and_private_interfaces: Публічні та приватні інтерфейси
        default_public_interface_only: Лише публічний інтерфейс
        disable_non_proxied_udp: Вимкнути непроксований UDP
