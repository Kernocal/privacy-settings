extension:
    name: 隱私控制
    description: 管理瀏覽器的隱私控制。
    description_chrome: 管理 Chrome 的內部隱私設定。
    description_edge: 管理 Edge 的內部隱私設定。
    chrome_name: Chrome 隱私控制
    edge_name: Edge 隱私控制
sidepanel:
    heading: 瀏覽器內部隱私控制
    disclaimer: 免責聲明：
    disclaimerText: 此擴充功能與 $1 無關。
    managedText: 所有設定均透過瀏覽器使用 browser.privacy 擴充功能 API 進行管理。
    learnMore: 進一步了解 browser.privacy API
    defaultLabel: 預設值：
    on: 開啟
    off: 關閉
settings:
    services:
        label: 服務
        description: 啟用或停用由 $2 及您的預設搜尋引擎提供的第三方網路服務功能的設定。
        autofillAddressEnabled:
            label: 自動填入地址
            description: 啟用後，$1 會主動提供自動填入地址及其他表單資料的功能。
        autofillCreditCardEnabled:
            label: 自動填入信用卡
            description: 啟用後，$1 會主動提供自動填入信用卡表單的功能。
        passwordSavingEnabled:
            label: 儲存密碼
            description: 啟用後，密碼管理員會詢問您是否要儲存密碼。
        searchSuggestEnabled:
            label: 搜尋建議
            description: 啟用後，$1 會將您在 Omnibox 中輸入的文字傳送至預設搜尋引擎，以提供可能符合您輸入內容的網站及搜尋建議。
        spellingServiceEnabled:
            label: 拼字檢查服務
            description: 啟用後，$1 會使用網路服務協助修正拼字錯誤。
        translationServiceEnabled:
            label: 翻譯服務
            description: 啟用後，$1 會主動提供翻譯非您閱讀語言的頁面。
        safeBrowsingEnabled:
            label: 安全瀏覽
            description: 啟用後，$1 會盡力保護您免受網路釣魚和惡意軟體的侵害。
        safeBrowsingExtendedReportingEnabled:
            label: 安全瀏覽延伸回報
            description: 啟用後，當 SafeBrowsing 封鎖某個頁面時，$1 會向 $2 傳送額外資訊，例如被封鎖頁面的內容。
        alternateErrorPagesEnabled:
            label: 替代錯誤頁面
            description: 啟用後，$1 會使用網路服務協助解決導航錯誤。
    websites:
        label: 網站
        description: 決定 $1 向網站提供哪些資訊的設定。
        doNotTrackEnabled:
            label: 禁止追蹤
            description: '啟用後，$1 會在您的請求中傳送「禁止追蹤」（DNT: 1）標頭。'
        thirdPartyCookiesAllowed:
            label: 允許第三方 Cookie
            description: 停用後，$1 會封鎖第三方網站設定 Cookie。擴充功能無法在 Incognito 模式下啟用此 API，因為在該模式中第三方 Cookie 會被封鎖，且只能在網站層級允許。如果您嘗試在 Incognito 中將此 API 設為 true，將會擲回錯誤。注意：即使此 API 傳回 false，個別網站若擁有有效豁免或使用 Storage Access API，仍可能存取第三方 Cookie。
        hyperlinkAuditingEnabled:
            label: 超連結稽核
            description: 啟用後，$1 會在網站要求時傳送稽核 ping（<a ping>）。
        protectedContentEnabled:
            label: 受保護內容
            description: 啟用後，$1 會提供唯一識別碼給外掛程式，以便執行受保護的內容。
        referrersEnabled:
            label: 參照來源
            description: 啟用後，$1 會在您的請求中傳送參照來源標頭。
    network:
        label: 網路
        description: 影響 $1 整體網路連線處理方式的設定。
        webRTCIPHandlingPolicy:
            label: WebRTC IP 處理政策
            description: 允許使用者指定影響 WebRTC 流量路由方式及本機位址資訊曝露程度的媒體效能／隱私權衡。
        networkPredictionEnabled:
            label: 網路預測
            description: 啟用後，$1 會嘗試透過預先解析 DNS 項目以及預先開啟與伺服器的 TCP 和 SSL 連線來加速您的網頁瀏覽體驗。此偏好設定僅影響 $1 內部預測服務所執行的動作，不影響網頁發起的預擷取或預連線。
    webrtc:
        default: 預設
        default_public_and_private_interfaces: 公用和私人介面
        default_public_interface_only: 僅公用介面
        disable_non_proxied_udp: 停用非代理 UDP
