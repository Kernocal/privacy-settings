extension:
    name: Integritetskontroller
    description: Hantera webbläsarens integritetskontroller.
    description_chrome: 'Hantera Chrome:s interna integritetsinställningar.'
    description_edge: 'Hantera Edge:s interna integritetsinställningar.'
    chrome_name: Chrome Integritetskontroller
    edge_name: Edge Integritetskontroller
sidepanel:
    heading: Interna integritetskontroller för webbläsaren
    disclaimer: 'Ansvarsfriskrivning:'
    disclaimerText: Detta tillägg är inte anslutet till $1.
    managedText: Alla inställningar hanteras i webbläsaren med hjälp av tilläggets browser.privacy API.
    learnMore: Läs mer om browser.privacy API
    defaultLabel: 'Standard:'
    on: På
    off: Av
settings:
    services:
        label: Tjänster
        description: Inställningar som aktiverar eller inaktiverar funktioner som kräver nätverkstjänster från tredje part som tillhandahålls av $2 och din standardsökmotor.
        autofillAddressEnabled:
            label: Autofyll adress
            description: Om aktiverat erbjuder $1 att automatiskt fylla i adresser och andra formulärdata.
        autofillCreditCardEnabled:
            label: Autofyll kreditkort
            description: Om aktiverat erbjuder $1 att automatiskt fylla i kreditkortsformulär.
        passwordSavingEnabled:
            label: Spara lösenord
            description: Om aktiverat frågar lösenordshanteraren om du vill spara lösenord.
        searchSuggestEnabled:
            label: Sökförslag
            description: 'Om aktiverat skickar $1 texten du skriver i Omnibox till din standardsökmotor, som ger förslag på webbplatser och sökningar som troligen kompletterar det du har skrivit hittills.'
        spellingServiceEnabled:
            label: Stavningstjänst
            description: Om aktiverat använder $1 en webbtjänst för att hjälpa till att rätta stavfel.
        translationServiceEnabled:
            label: Översättningstjänst
            description: Om aktiverat erbjuder $1 att översätta sidor som inte är på ett språk du läser.
        safeBrowsingEnabled:
            label: Säker surfning
            description: Om aktiverat gör $1 sitt bästa för att skydda dig mot nätfiske och skadlig programvara.
        safeBrowsingExtendedReportingEnabled:
            label: Utökad rapportering för säker surfning
            description: 'Om aktiverat skickar $1 ytterligare information till $2 när SafeBrowsing blockerar en sida, till exempel innehållet på den blockerade sidan.'
        alternateErrorPagesEnabled:
            label: Alternativa felsidor
            description: Om aktiverat använder $1 en webbtjänst för att hjälpa till att lösa navigeringsfel.
    websites:
        label: Webbplatser
        description: Inställningar som avgör vilken information $1 gör tillgänglig för webbplatser.
        doNotTrackEnabled:
            label: Spåra inte
            description: "Om aktiverat skickar $1 en 'Do Not Track'-rubrik (DNT: 1) med dina förfrågningar."
        thirdPartyCookiesAllowed:
            label: Tredjepartskakor tillåtna
            description: 'Om inaktiverat blockerar $1 tredjepartssidor från att sätta kakor. Tillägg kan inte aktivera detta API i Incognito-läge, där tredjepartskakor blockeras och bara kan tillåtas på webbplatsnivå. Om du försöker ställa in detta API till sant i Incognito uppstår ett fel. Obs: Enskilda webbplatser kan fortfarande ha tillgång till tredjepartskakor när detta API returnerar falskt, om de har ett giltigt undantag eller använder Storage Access API istället.'
        hyperlinkAuditingEnabled:
            label: Hyperlänksgranskning
            description: Om aktiverat skickar $1 granskningspingar när en webbplats begär det (<a ping>).
        protectedContentEnabled:
            label: Skyddat innehåll
            description: Om aktiverat tillhandahåller $1 ett unikt ID till insticksprogram för att köra skyddat innehåll.
        referrersEnabled:
            label: Hänvisare
            description: Om aktiverat skickar $1 referer-rubriker med dina förfrågningar.
    network:
        label: Nätverk
        description: Inställningar som påverkar hur $1 hanterar nätverksanslutningar i allmänhet.
        webRTCIPHandlingPolicy:
            label: WebRTC IP-hanteringspolicy
            description: Låt användare ange avvägningen mellan medieprestanda och integritet som påverkar hur WebRTC-trafik dirigeras och hur mycket lokal adressinformation som exponeras.
        networkPredictionEnabled:
            label: Nätverksprediktion
            description: 'Om aktiverat försöker $1 snabba upp din webbupplevelse genom att i förväg slå upp DNS-poster och förebyggande öppna TCP- och SSL-anslutningar till servrar. Denna inställning påverkar bara åtgärder som utförs av $1:s interna prediktionstjänst. Den påverkar inte förhämtningar eller föranslutningar som initieras av webbsidor.'
    webrtc:
        default: Standard
        default_public_and_private_interfaces: Offentliga och privata gränssnitt
        default_public_interface_only: Endast offentligt gränssnitt
        disable_non_proxied_udp: Inaktivera icke-proxad UDP
