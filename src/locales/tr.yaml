extension:
    name: Gizlilik Kontrolleri
    description: Tarayıcının gizlilik kontrollerini yönetin.
    description_chrome: "Chrome'un dahili gizlilik ayarlarını yönetin."
    description_edge: "Edge'in dahili gizlilik ayarlarını yönetin."
    chrome_name: Chrome Gizlilik Kontrolleri
    edge_name: Edge Gizlilik Kontrolleri
sidepanel:
    heading: Dahili Tarayıcı Gizlilik Kontrolleri
    disclaimer: 'Sorumluluk Reddi:'
    disclaimerText: Bu uzantı $1 ile bağlantılı değildir.
    managedText: "Tüm ayarlar, browser.privacy uzantı API'si kullanılarak tarayıcı içinde yönetilmektedir."
    learnMore: browser.privacy API hakkında daha fazla bilgi edinin
    defaultLabel: 'Varsayılan:'
    on: Açık
    off: Kapalı
settings:
    services:
        label: Hizmetler
        description: $2 ve varsayılan arama sağlayıcınız tarafından sunulan üçüncü taraf ağ hizmetleri gerektiren özellikleri etkinleştiren veya devre dışı bırakan ayarlar.
        autofillAddressEnabled:
            label: Adres Otomatik Doldurma
            description: 'Etkinleştirilirse, $1 adresleri ve diğer form verilerini otomatik olarak doldurmayı teklif eder.'
        autofillCreditCardEnabled:
            label: Kredi Kartı Otomatik Doldurma
            description: 'Etkinleştirilirse, $1 kredi kartı formlarını otomatik olarak doldurmayı teklif eder.'
        passwordSavingEnabled:
            label: Şifre Kaydetme
            description: 'Etkinleştirilirse, şifre yöneticisi şifreleri kaydetmek isteyip istemediğinizi sorar.'
        searchSuggestEnabled:
            label: Arama Önerileri
            description: "Etkinleştirilirse, $1 Omnibox'a yazdığınız metni varsayılan arama motorunuza gönderir ve arama motoru, şu ana kadar yazdıklarınızın olası tamamlamalarını tahmin eder."
        spellingServiceEnabled:
            label: Yazım Denetimi Hizmeti
            description: 'Etkinleştirilirse, $1 yazım hatalarını düzeltmeye yardımcı olmak için bir web hizmeti kullanır.'
        translationServiceEnabled:
            label: Çeviri Hizmeti
            description: 'Etkinleştirilirse, $1 okuduğunuz dilde olmayan sayfaları çevirmeyi teklif eder.'
        safeBrowsingEnabled:
            label: Güvenli Tarama
            description: 'Etkinleştirilirse, $1 sizi kimlik avı ve kötü amaçlı yazılımlardan korumak için elinden geleni yapar.'
        safeBrowsingExtendedReportingEnabled:
            label: Güvenli Tarama Genişletilmiş Raporlama
            description: "Etkinleştirilirse, SafeBrowsing bir sayfayı engellediğinde $1, engellenen sayfanın içeriği gibi ek bilgileri $2'ye gönderir."
        alternateErrorPagesEnabled:
            label: Alternatif Hata Sayfaları
            description: 'Etkinleştirilirse, $1 gezinme hatalarını çözmeye yardımcı olmak için bir web hizmeti kullanır.'
    websites:
        label: Web Siteleri
        description: "$1'in web sitelerine hangi bilgileri sunacağını belirleyen ayarlar."
        doNotTrackEnabled:
            label: İzleme Yapma
            description: "Etkinleştirilirse, $1 isteklerinizle birlikte 'İzleme Yapma' (DNT: 1) başlığı gönderir."
        thirdPartyCookiesAllowed:
            label: Üçüncü Taraf Çerezlere İzin Verildi
            description: "Devre dışı bırakılırsa, $1 üçüncü taraf sitelerin çerez ayarlamasını engeller. Uzantılar, üçüncü taraf çerezlerin engellendiği ve yalnızca site düzeyinde izin verilebileceği Incognito modunda bu API'yi etkinleştiremez. Bu API'yi Incognito'da true olarak ayarlamaya çalışırsanız, bir hata oluşur. Not: Bu API false döndürdüğünde bile, geçerli bir muafiyetleri varsa veya bunun yerine Storage Access API kullanıyorlarsa, bireysel siteler üçüncü taraf çerezlere erişebilir."
        hyperlinkAuditingEnabled:
            label: Bağlantı Denetimi
            description: "Etkinleştirilirse, $1 bir web sitesi tarafından istendiğinde denetim ping'leri gönderir (<a ping>)."
        protectedContentEnabled:
            label: Korumalı İçerik
            description: 'Etkinleştirilirse, $1 korumalı içeriği çalıştırmak için eklentilere benzersiz bir kimlik sağlar.'
        referrersEnabled:
            label: Yönlendiriciler
            description: 'Etkinleştirilirse, $1 isteklerinizle birlikte referer başlıkları gönderir.'
    network:
        label: Ağ
        description: "$1'in genel olarak ağ bağlantılarını ele alışını etkileyen ayarlar."
        webRTCIPHandlingPolicy:
            label: WebRTC IP İşleme Politikası
            description: 'Kullanıcıların, WebRTC trafiğinin nasıl yönlendirileceğini ve ne kadar yerel adres bilgisinin açığa çıkacağını etkileyen medya performansı/gizlilik dengelerini belirlemesine olanak tanır.'
        networkPredictionEnabled:
            label: Ağ Tahmini
            description: "Etkinleştirilirse, $1 DNS girişlerini önceden çözümleyerek ve sunuculara önceden TCP ve SSL bağlantıları açarak web tarama deneyiminizi hızlandırmaya çalışır. Bu tercih yalnızca $1'in dahili tahmin hizmeti tarafından gerçekleştirilen eylemleri etkiler. Web sayfası tarafından başlatılan önceden getirmeleri veya önceden bağlantıları etkilemez."
    webrtc:
        default: Varsayılan
        default_public_and_private_interfaces: Genel ve Özel Arayüzler
        default_public_interface_only: Yalnızca Genel Arayüz
        disable_non_proxied_udp: "Proxy'siz UDP'yi Devre Dışı Bırak"
