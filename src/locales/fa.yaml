extension:
    name: کنترل‌های حریم خصوصی
    description: مدیریت کنترل‌های حریم خصوصی مرورگر.
    description_chrome: مدیریت تنظیمات داخلی حریم خصوصی Chrome.
    description_edge: مدیریت تنظیمات داخلی حریم خصوصی Edge.
    chrome_name: کنترل‌های حریم خصوصی Chrome
    edge_name: کنترل‌های حریم خصوصی Edge
sidepanel:
    heading: کنترل‌های داخلی حریم خصوصی مرورگر
    disclaimer: 'سلب مسئولیت:'
    disclaimerText: این افزونه وابستگی به $1 ندارد.
    managedText: تمام تنظیمات در داخل مرورگر با استفاده از browser.privacy API مدیریت می‌شوند.
    learnMore: درباره browser.privacy API بیشتر بدانید
    defaultLabel: 'پیش‌فرض:'
    on: روشن
    off: خاموش
settings:
    services:
        label: خدمات
        description: تنظیماتی که ویژگی‌هایی را فعال یا غیرفعال می‌کنند که به خدمات شبکه شخص ثالث ارائه‌شده توسط $2 و ارائه‌دهنده جستجوی پیش‌فرض شما نیاز دارند.
        autofillAddressEnabled:
            label: تکمیل خودکار آدرس
            description: اگر فعال باشد، $1 پیشنهاد پر کردن خودکار آدرس‌ها و سایر داده‌های فرم را می‌دهد.
        autofillCreditCardEnabled:
            label: تکمیل خودکار کارت اعتباری
            description: اگر فعال باشد، $1 پیشنهاد پر کردن خودکار فرم‌های کارت اعتباری را می‌دهد.
        passwordSavingEnabled:
            label: ذخیره رمز عبور
            description: اگر فعال باشد، مدیر رمز عبور از شما می‌پرسد که آیا می‌خواهید رمزهای عبور را ذخیره کنید.
        searchSuggestEnabled:
            label: پیشنهاد جستجو
            description: اگر فعال باشد، $1 متنی را که در Omnibox تایپ می‌کنید به موتور جستجوی پیش‌فرض شما ارسال می‌کند، که پیش‌بینی‌هایی از وب‌سایت‌ها و جستجوهایی ارائه می‌دهد که احتمالاً تکمیل‌کننده آنچه تا کنون تایپ کرده‌اید هستند.
        spellingServiceEnabled:
            label: سرویس املا
            description: اگر فعال باشد، $1 از یک سرویس وب برای کمک به تصحیح خطاهای املایی استفاده می‌کند.
        translationServiceEnabled:
            label: سرویس ترجمه
            description: اگر فعال باشد، $1 پیشنهاد ترجمه صفحاتی را می‌دهد که به زبانی نیستند که شما می‌خوانید.
        safeBrowsingEnabled:
            label: مرور ایمن
            description: اگر فعال باشد، $1 تمام تلاش خود را برای محافظت از شما در برابر فیشینگ و بدافزار انجام می‌دهد.
        safeBrowsingExtendedReportingEnabled:
            label: گزارش‌دهی گسترده مرور ایمن
            description: اگر فعال باشد، $1 هنگامی که SafeBrowsing صفحه‌ای را مسدود می‌کند، اطلاعات اضافی از جمله محتوای صفحه مسدودشده را به $2 ارسال می‌کند.
        alternateErrorPagesEnabled:
            label: صفحات خطای جایگزین
            description: اگر فعال باشد، $1 از یک سرویس وب برای کمک به رفع خطاهای ناوبری استفاده می‌کند.
    websites:
        label: وب‌سایت‌ها
        description: تنظیماتی که تعیین می‌کنند $1 چه اطلاعاتی را در اختیار وب‌سایت‌ها قرار دهد.
        doNotTrackEnabled:
            label: ردیابی نکن
            description: "اگر فعال باشد، $1 سرآیند 'Do Not Track' (DNT: 1) را همراه با درخواست‌های شما ارسال می‌کند."
        thirdPartyCookiesAllowed:
            label: کوکی‌های شخص ثالث مجاز
            description: 'اگر غیرفعال باشد، $1 سایت‌های شخص ثالث را از تنظیم کوکی مسدود می‌کند. افزونه‌ها نمی‌توانند این API را در حالت Incognito فعال کنند، جایی که کوکی‌های شخص ثالث مسدود هستند و فقط در سطح سایت می‌توان آن‌ها را مجاز کرد. اگر سعی کنید این API را در Incognito روی true تنظیم کنید، خطا دریافت خواهید کرد. توجه: سایت‌های خاص ممکن است همچنان بتوانند به کوکی‌های شخص ثالث دسترسی داشته باشند حتی وقتی این API مقدار false برمی‌گرداند، اگر معافیت معتبری داشته باشند یا از Storage Access API استفاده کنند.'
        hyperlinkAuditingEnabled:
            label: بازرسی پیوند
            description: اگر فعال باشد، $1 هنگامی که وب‌سایتی درخواست کند، پینگ‌های بازرسی ارسال می‌کند (<a ping>).
        protectedContentEnabled:
            label: محتوای محافظت‌شده
            description: اگر فعال باشد، $1 شناسه منحصربه‌فردی به افزونه‌ها ارائه می‌دهد تا محتوای محافظت‌شده اجرا شود.
        referrersEnabled:
            label: ارجاع‌دهنده‌ها
            description: اگر فعال باشد، $1 سرآیندهای ارجاع‌دهنده را همراه با درخواست‌های شما ارسال می‌کند.
    network:
        label: شبکه
        description: تنظیماتی که بر نحوه مدیریت اتصالات شبکه توسط $1 به‌طور کلی تأثیر می‌گذارند.
        webRTCIPHandlingPolicy:
            label: سیاست مدیریت IP در WebRTC
            description: به کاربران اجازه می‌دهد تعادل عملکرد/حریم خصوصی رسانه را مشخص کنند که بر نحوه مسیریابی ترافیک WebRTC و میزان اطلاعات آدرس محلی که فاش می‌شود تأثیر می‌گذارد.
        networkPredictionEnabled:
            label: پیش‌بینی شبکه
            description: اگر فعال باشد، $1 تلاش می‌کند تجربه مرور وب شما را با حل پیشاپیش ورودی‌های DNS و باز کردن پیشگیرانه اتصالات TCP و SSL به سرورها سرعت ببخشد. این تنظیم فقط بر اقدامات انجام‌شده توسط سرویس پیش‌بینی داخلی $1 تأثیر می‌گذارد و بر واکشی‌ها یا اتصالات پیشاپیش آغازشده توسط صفحات وب تأثیری ندارد.
    webrtc:
        default: پیش‌فرض
        default_public_and_private_interfaces: رابط‌های عمومی و خصوصی
        default_public_interface_only: فقط رابط عمومی
        disable_non_proxied_udp: غیرفعال کردن UDP بدون پروکسی
