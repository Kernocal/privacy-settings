extension:
    name: Điều khiển Quyền riêng tư
    description: Quản lý các điều khiển quyền riêng tư của trình duyệt.
    description_chrome: Quản lý các cài đặt quyền riêng tư nội bộ của Chrome.
    description_edge: Quản lý các cài đặt quyền riêng tư nội bộ của Edge.
    chrome_name: Điều khiển Quyền riêng tư Chrome
    edge_name: Điều khiển Quyền riêng tư Edge
sidepanel:
    heading: Điều khiển Quyền riêng tư Nội bộ Trình duyệt
    disclaimer: 'Tuyên bố miễn trừ:'
    disclaimerText: Tiện ích mở rộng này không liên kết với $1.
    managedText: Tất cả cài đặt được quản lý trong trình duyệt bằng API tiện ích mở rộng browser.privacy.
    learnMore: Tìm hiểu thêm về API browser.privacy
    defaultLabel: 'Mặc định:'
    on: Bật
    off: Tắt
settings:
    services:
        label: Dịch vụ
        description: Cài đặt bật hoặc tắt các tính năng yêu cầu dịch vụ mạng của bên thứ ba được cung cấp bởi $2 và nhà cung cấp tìm kiếm mặc định của bạn.
        autofillAddressEnabled:
            label: Tự động điền Địa chỉ
            description: 'Nếu được bật, $1 đề nghị tự động điền địa chỉ và các dữ liệu biểu mẫu khác.'
        autofillCreditCardEnabled:
            label: Tự động điền Thẻ tín dụng
            description: 'Nếu được bật, $1 đề nghị tự động điền các biểu mẫu thẻ tín dụng.'
        passwordSavingEnabled:
            label: Lưu Mật khẩu
            description: 'Nếu được bật, trình quản lý mật khẩu sẽ hỏi bạn có muốn lưu mật khẩu không.'
        searchSuggestEnabled:
            label: Đề xuất Tìm kiếm
            description: 'Nếu được bật, $1 gửi văn bản bạn nhập vào Omnibox đến công cụ tìm kiếm mặc định của bạn, công cụ này sẽ đưa ra dự đoán về các trang web và tìm kiếm có khả năng hoàn thành nội dung bạn đã nhập.'
        spellingServiceEnabled:
            label: Dịch vụ Kiểm tra Chính tả
            description: 'Nếu được bật, $1 sử dụng dịch vụ web để giúp sửa lỗi chính tả.'
        translationServiceEnabled:
            label: Dịch vụ Dịch thuật
            description: 'Nếu được bật, $1 đề nghị dịch các trang không phải ngôn ngữ bạn đọc.'
        safeBrowsingEnabled:
            label: Duyệt web An toàn
            description: 'Nếu được bật, $1 cố gắng hết sức để bảo vệ bạn khỏi lừa đảo và phần mềm độc hại.'
        safeBrowsingExtendedReportingEnabled:
            label: Báo cáo Mở rộng Duyệt web An toàn
            description: 'Nếu được bật, $1 sẽ gửi thông tin bổ sung cho $2 khi SafeBrowsing chặn một trang, chẳng hạn như nội dung của trang bị chặn.'
        alternateErrorPagesEnabled:
            label: Trang Lỗi Thay thế
            description: 'Nếu được bật, $1 sử dụng dịch vụ web để giúp giải quyết các lỗi điều hướng.'
    websites:
        label: Trang web
        description: Cài đặt xác định thông tin nào $1 cung cấp cho các trang web.
        doNotTrackEnabled:
            label: Không Theo dõi
            description: "Nếu được bật, $1 gửi tiêu đề 'Không Theo dõi' (DNT: 1) cùng với các yêu cầu của bạn."
        thirdPartyCookiesAllowed:
            label: Cho phép Cookie Bên thứ ba
            description: 'Nếu bị tắt, $1 chặn các trang bên thứ ba đặt cookie. Tiện ích mở rộng không thể bật API này ở chế độ Incognito, nơi cookie bên thứ ba bị chặn và chỉ có thể được cho phép ở cấp trang web. Nếu bạn cố đặt API này thành true trong Incognito, nó sẽ báo lỗi. Lưu ý: Các trang web riêng lẻ vẫn có thể truy cập cookie bên thứ ba khi API này trả về false, nếu chúng có miễn trừ hợp lệ hoặc sử dụng Storage Access API thay thế.'
        hyperlinkAuditingEnabled:
            label: Kiểm tra Siêu liên kết
            description: 'Nếu được bật, $1 gửi các ping kiểm tra khi được trang web yêu cầu (<a ping>).'
        protectedContentEnabled:
            label: Nội dung Được bảo vệ
            description: 'Nếu được bật, $1 cung cấp một ID duy nhất cho các plugin để chạy nội dung được bảo vệ.'
        referrersEnabled:
            label: Tiêu đề Giới thiệu
            description: 'Nếu được bật, $1 gửi tiêu đề referer cùng với các yêu cầu của bạn.'
    network:
        label: Mạng
        description: Cài đặt ảnh hưởng đến cách $1 xử lý các kết nối mạng nói chung.
        webRTCIPHandlingPolicy:
            label: Chính sách Xử lý IP WebRTC
            description: 'Cho phép người dùng chỉ định sự đánh đổi giữa hiệu suất phương tiện và quyền riêng tư, ảnh hưởng đến cách lưu lượng WebRTC được định tuyến và mức độ thông tin địa chỉ cục bộ được tiết lộ.'
        networkPredictionEnabled:
            label: Dự đoán Mạng
            description: 'Nếu được bật, $1 cố gắng tăng tốc trải nghiệm duyệt web của bạn bằng cách phân giải trước các mục DNS và mở trước các kết nối TCP và SSL đến máy chủ. Tùy chọn này chỉ ảnh hưởng đến các hành động do dịch vụ dự đoán nội bộ của $1 thực hiện. Nó không ảnh hưởng đến các prefetch hoặc preconnect do trang web khởi tạo.'
    webrtc:
        default: Mặc định
        default_public_and_private_interfaces: Giao diện Công khai và Riêng tư
        default_public_interface_only: Chỉ Giao diện Công khai
        disable_non_proxied_udp: Tắt UDP Không qua Proxy
