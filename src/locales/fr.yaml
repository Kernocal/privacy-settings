extension:
    name: Contrôles de confidentialité
    description: Gérer les contrôles de confidentialité du navigateur.
    description_chrome: Gérer les paramètres de confidentialité internes de Chrome.
    description_edge: Gérer les paramètres de confidentialité internes de Edge.
    chrome_name: Contrôles de confidentialité Chrome
    edge_name: Contrôles de confidentialité Edge
sidepanel:
    heading: Contrôles internes de confidentialité du navigateur
    disclaimer: 'Avertissement :'
    disclaimerText: "Cette extension n'est pas affiliée à $1."
    managedText: "Tous les paramètres sont gérés au sein du navigateur à l'aide de l'API d'extension browser.privacy."
    learnMore: "En savoir plus sur l'API browser.privacy"
    defaultLabel: 'Par défaut :'
    on: Activé
    off: Désactivé
settings:
    services:
        label: Services
        description: Paramètres qui activent ou désactivent des fonctionnalités nécessitant des services réseau tiers fournis par $2 et votre moteur de recherche par défaut.
        autofillAddressEnabled:
            label: Remplissage automatique des adresses
            description: 'Si activé, $1 propose de remplir automatiquement les adresses et autres données de formulaire.'
        autofillCreditCardEnabled:
            label: Remplissage automatique des cartes de crédit
            description: 'Si activé, $1 propose de remplir automatiquement les formulaires de carte de crédit.'
        passwordSavingEnabled:
            label: Enregistrement des mots de passe
            description: 'Si activé, le gestionnaire de mots de passe vous demande si vous souhaitez enregistrer vos mots de passe.'
        searchSuggestEnabled:
            label: Suggestions de recherche
            description: "Si activé, $1 envoie le texte que vous saisissez dans l'Omnibox à votre moteur de recherche par défaut, qui fournit des prédictions de sites web et de recherches susceptibles de compléter ce que vous avez tapé jusqu'à présent."
        spellingServiceEnabled:
            label: Service orthographique
            description: "Si activé, $1 utilise un service web pour aider à corriger les fautes d'orthographe."
        translationServiceEnabled:
            label: Service de traduction
            description: 'Si activé, $1 propose de traduire les pages qui ne sont pas dans une langue que vous lisez.'
        safeBrowsingEnabled:
            label: Navigation sécurisée
            description: "Si activé, $1 fait de son mieux pour vous protéger contre l'hameçonnage et les logiciels malveillants."
        safeBrowsingExtendedReportingEnabled:
            label: Rapports étendus de navigation sécurisée
            description: 'Si activé, $1 envoie des informations supplémentaires à $2 lorsque SafeBrowsing bloque une page, telles que le contenu de la page bloquée.'
        alternateErrorPagesEnabled:
            label: "Pages d'erreur alternatives"
            description: 'Si activé, $1 utilise un service web pour aider à résoudre les erreurs de navigation.'
    websites:
        label: Sites web
        description: Paramètres qui déterminent quelles informations $1 met à la disposition des sites web.
        doNotTrackEnabled:
            label: Ne pas pister
            description: "Si activé, $1 envoie l'en-tête « Ne pas pister » (DNT: 1) avec vos requêtes."
        thirdPartyCookiesAllowed:
            label: Cookies tiers autorisés
            description: "Si désactivé, $1 empêche les sites tiers de définir des cookies. Les extensions ne peuvent pas activer cette API en mode Incognito, où les cookies tiers sont bloqués et ne peuvent être autorisés qu'au niveau du site. Si vous essayez de définir cette API sur vrai en mode Incognito, une erreur sera générée. Remarque : certains sites peuvent toujours accéder aux cookies tiers lorsque cette API renvoie faux, s'ils disposent d'une exemption valide ou s'ils utilisent le Storage Access API à la place."
        hyperlinkAuditingEnabled:
            label: Audit des hyperliens
            description: "Si activé, $1 envoie des pings d'audit lorsqu'un site web le demande (<a ping>)."
        protectedContentEnabled:
            label: Contenu protégé
            description: 'Si activé, $1 fournit un identifiant unique aux plugins afin de lire du contenu protégé.'
        referrersEnabled:
            label: Référents
            description: 'Si activé, $1 envoie des en-têtes de référent avec vos requêtes.'
    network:
        label: Réseau
        description: Paramètres qui influencent la gestion des connexions réseau par $1 en général.
        webRTCIPHandlingPolicy:
            label: Politique de gestion des adresses IP WebRTC
            description: "Permet aux utilisateurs de spécifier les compromis entre performances et confidentialité des médias, ce qui a un impact sur le routage du trafic WebRTC et sur la quantité d'informations d'adresse locale exposées."
        networkPredictionEnabled:
            label: Prédiction réseau
            description: "Si activé, $1 tente d'accélérer votre navigation web en pré-résolvant les entrées DNS et en ouvrant de manière préventive des connexions TCP et SSL vers les serveurs. Cette préférence n'affecte que les actions entreprises par le service de prédiction interne de $1. Elle n'affecte pas les pré-chargements ou pré-connexions initiés par les pages web."
    webrtc:
        default: Par défaut
        default_public_and_private_interfaces: Interfaces publiques et privées
        default_public_interface_only: Interface publique uniquement
        disable_non_proxied_udp: Désactiver le UDP non relayé par un proxy
