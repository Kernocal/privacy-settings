extension:
    name: בקרות פרטיות
    description: ניהול בקרות הפרטיות של הדפדפן.
    description_chrome: ניהול הגדרות הפרטיות הפנימיות של Chrome.
    description_edge: ניהול הגדרות הפרטיות הפנימיות של Edge.
    chrome_name: בקרות פרטיות של Chrome
    edge_name: בקרות פרטיות של Edge
sidepanel:
    heading: בקרות פרטיות פנימיות של הדפדפן
    disclaimer: 'הצהרה:'
    disclaimerText: תוסף זה אינו מסונף ל-$1.
    managedText: כל ההגדרות מנוהלות בתוך הדפדפן באמצעות browser.privacy extension API.
    learnMore: למידע נוסף על browser.privacy API
    defaultLabel: 'ברירת מחדל:'
    on: פעיל
    off: כבוי
settings:
    services:
        label: שירותים
        description: הגדרות המפעילות או משביתות תכונות הדורשות שירותי רשת של צד שלישי המסופקים על ידי $2 וספק החיפוש שלך כברירת מחדל.
        autofillAddressEnabled:
            label: מילוי אוטומטי של כתובת
            description: 'אם מופעל, $1 מציע למלא אוטומטית כתובות ונתוני טפסים אחרים.'
        autofillCreditCardEnabled:
            label: מילוי אוטומטי של כרטיס אשראי
            description: 'אם מופעל, $1 מציע למלא אוטומטית טפסי כרטיס אשראי.'
        passwordSavingEnabled:
            label: שמירת סיסמאות
            description: 'אם מופעל, מנהל הסיסמאות ישאל אם ברצונך לשמור סיסמאות.'
        searchSuggestEnabled:
            label: הצעות חיפוש
            description: 'אם מופעל, $1 שולח את הטקסט שאתה מקליד ב-Omnibox למנוע החיפוש שלך כברירת מחדל, אשר מספק תחזיות של אתרים וחיפושים שסביר שהם השלמות של מה שהקלדת עד כה.'
        spellingServiceEnabled:
            label: שירות בדיקת איות
            description: 'אם מופעל, $1 משתמש בשירות אינטרנט כדי לסייע בתיקון שגיאות כתיב.'
        translationServiceEnabled:
            label: שירות תרגום
            description: 'אם מופעל, $1 מציע לתרגם דפים שאינם בשפה שאתה קורא.'
        safeBrowsingEnabled:
            label: גלישה בטוחה
            description: 'אם מופעל, $1 עושה כמיטב יכולתו להגן עליך מפני פישינג ותוכנות זדוניות.'
        safeBrowsingExtendedReportingEnabled:
            label: דיווח מורחב של גלישה בטוחה
            description: 'אם מופעל, $1 ישלח מידע נוסף ל-$2 כאשר SafeBrowsing חוסם דף, כגון תוכן הדף החסום.'
        alternateErrorPagesEnabled:
            label: דפי שגיאה חלופיים
            description: 'אם מופעל, $1 משתמש בשירות אינטרנט כדי לסייע בפתרון שגיאות ניווט.'
    websites:
        label: אתרים
        description: הגדרות הקובעות איזה מידע $1 מעמיד לרשות אתרים.
        doNotTrackEnabled:
            label: אל תעקוב
            description: "אם מופעל, $1 שולח כותרת 'אל תעקוב' (DNT: 1) עם הבקשות שלך."
        thirdPartyCookiesAllowed:
            label: עוגיות צד שלישי מותרות
            description: 'אם מושבת, $1 חוסם אתרי צד שלישי מלהגדיר עוגיות. תוספים אינם יכולים להפעיל API זה במצב Incognito, שבו עוגיות צד שלישי חסומות וניתן לאפשר אותן רק ברמת האתר. אם תנסה להגדיר API זה כ-true ב-Incognito, תיזרק שגיאה. הערה: אתרים בודדים עדיין עשויים לגשת לעוגיות צד שלישי כאשר API זה מחזיר false, אם יש להם פטור תקף או שהם משתמשים ב-Storage Access API במקום.'
        hyperlinkAuditingEnabled:
            label: ביקורת היפר-קישורים
            description: 'אם מופעל, $1 שולח פינגים לביקורת כאשר אתר מבקש זאת (<a ping>).'
        protectedContentEnabled:
            label: תוכן מוגן
            description: 'אם מופעל, $1 מספק מזהה ייחודי לתוספים כדי להפעיל תוכן מוגן.'
        referrersEnabled:
            label: מפנים
            description: 'אם מופעל, $1 שולח כותרות מפנה עם הבקשות שלך.'
    network:
        label: רשת
        description: הגדרות המשפיעות על אופן הטיפול של $1 בחיבורי רשת באופן כללי.
        webRTCIPHandlingPolicy:
            label: מדיניות טיפול ב-IP של WebRTC
            description: 'מאפשר למשתמשים לציין את הפשרות בין ביצועי מדיה לפרטיות, המשפיעות על אופן ניתוב תעבורת WebRTC וכמה מידע על כתובות מקומיות נחשף.'
        networkPredictionEnabled:
            label: חיזוי רשת
            description: 'אם מופעל, $1 מנסה להאיץ את חוויית הגלישה שלך על ידי פתרון מוקדם של רשומות DNS ופתיחה מקדימה של חיבורי TCP ו-SSL לשרתים. העדפה זו משפיעה רק על פעולות שננקטות על ידי שירות החיזוי הפנימי של $1. היא אינה משפיעה על שליפות מוקדמות או חיבורים מוקדמים שמופעלים על ידי דפי אינטרנט.'
    webrtc:
        default: ברירת מחדל
        default_public_and_private_interfaces: ממשקים ציבוריים ופרטיים
        default_public_interface_only: ממשק ציבורי בלבד
        disable_non_proxied_udp: השבתת UDP שאינו עובר דרך פרוקסי
