extension:
    name: Kontrol Privasi
    description: Kelola kontrol privasi browser.
    description_chrome: Kelola pengaturan privasi internal Chrome.
    description_edge: Kelola pengaturan privasi internal Edge.
    chrome_name: Kontrol Privasi Chrome
    edge_name: Kontrol Privasi Edge
sidepanel:
    heading: Kontrol Privasi Internal Browser
    disclaimer: 'Penyangkalan:'
    disclaimerText: Ekstensi ini tidak berafiliasi dengan $1.
    managedText: Semua pengaturan dikelola di dalam browser menggunakan API ekstensi browser.privacy.
    learnMore: Pelajari lebih lanjut tentang API browser.privacy
    defaultLabel: 'Bawaan:'
    on: Aktif
    off: Nonaktif
settings:
    services:
        label: Layanan
        description: Pengaturan yang mengaktifkan atau menonaktifkan fitur yang memerlukan layanan jaringan pihak ketiga yang disediakan oleh $2 dan penyedia pencarian bawaan Anda.
        autofillAddressEnabled:
            label: Isi Otomatis Alamat
            description: 'Jika diaktifkan, $1 menawarkan untuk mengisi alamat dan data formulir lainnya secara otomatis.'
        autofillCreditCardEnabled:
            label: Isi Otomatis Kartu Kredit
            description: 'Jika diaktifkan, $1 menawarkan untuk mengisi formulir kartu kredit secara otomatis.'
        passwordSavingEnabled:
            label: Penyimpanan Kata Sandi
            description: 'Jika diaktifkan, pengelola kata sandi akan bertanya apakah Anda ingin menyimpan kata sandi.'
        searchSuggestEnabled:
            label: Saran Pencarian
            description: 'Jika diaktifkan, $1 mengirimkan teks yang Anda ketik di Omnibox ke mesin pencari bawaan Anda, yang memberikan prediksi situs web dan pencarian yang kemungkinan merupakan kelanjutan dari apa yang telah Anda ketik.'
        spellingServiceEnabled:
            label: Layanan Ejaan
            description: 'Jika diaktifkan, $1 menggunakan layanan web untuk membantu memperbaiki kesalahan ejaan.'
        translationServiceEnabled:
            label: Layanan Terjemahan
            description: 'Jika diaktifkan, $1 menawarkan untuk menerjemahkan halaman yang tidak dalam bahasa yang Anda baca.'
        safeBrowsingEnabled:
            label: Penjelajahan Aman
            description: 'Jika diaktifkan, $1 berusaha sebaik mungkin untuk melindungi Anda dari phishing dan malware.'
        safeBrowsingExtendedReportingEnabled:
            label: Pelaporan Lanjutan Penjelajahan Aman
            description: 'Jika diaktifkan, $1 akan mengirimkan informasi tambahan ke $2 ketika SafeBrowsing memblokir halaman, seperti konten halaman yang diblokir.'
        alternateErrorPagesEnabled:
            label: Halaman Kesalahan Alternatif
            description: 'Jika diaktifkan, $1 menggunakan layanan web untuk membantu menyelesaikan kesalahan navigasi.'
    websites:
        label: Situs Web
        description: Pengaturan yang menentukan informasi apa yang $1 sediakan untuk situs web.
        doNotTrackEnabled:
            label: Jangan Lacak
            description: "Jika diaktifkan, $1 mengirimkan header 'Do Not Track' (DNT: 1) bersama permintaan Anda."
        thirdPartyCookiesAllowed:
            label: Cookie Pihak Ketiga Diizinkan
            description: 'Jika dinonaktifkan, $1 memblokir situs pihak ketiga dari menyetel cookie. Ekstensi tidak dapat mengaktifkan API ini dalam mode Incognito, di mana cookie pihak ketiga diblokir dan hanya dapat diizinkan pada tingkat situs. Jika Anda mencoba menyetel API ini ke true dalam Incognito, akan muncul kesalahan. Catatan: Situs individual mungkin masih dapat mengakses cookie pihak ketiga ketika API ini mengembalikan false, jika mereka memiliki pengecualian yang valid atau menggunakan Storage Access API sebagai gantinya.'
        hyperlinkAuditingEnabled:
            label: Audit Hyperlink
            description: 'Jika diaktifkan, $1 mengirimkan ping audit saat diminta oleh situs web (<a ping>).'
        protectedContentEnabled:
            label: Konten Terlindungi
            description: 'Jika diaktifkan, $1 menyediakan ID unik ke plugin untuk menjalankan konten terlindungi.'
        referrersEnabled:
            label: Referrer
            description: 'Jika diaktifkan, $1 mengirimkan header referer bersama permintaan Anda.'
    network:
        label: Jaringan
        description: Pengaturan yang memengaruhi penanganan koneksi jaringan $1 secara umum.
        webRTCIPHandlingPolicy:
            label: Kebijakan Penanganan IP WebRTC
            description: Memungkinkan pengguna menentukan kompromi kinerja/privasi media yang memengaruhi bagaimana lalu lintas WebRTC akan dialihkan dan berapa banyak informasi alamat lokal yang terekspos.
        networkPredictionEnabled:
            label: Prediksi Jaringan
            description: 'Jika diaktifkan, $1 berusaha mempercepat pengalaman penjelajahan web Anda dengan melakukan pra-resolusi entri DNS dan membuka koneksi TCP dan SSL ke server secara preemptif. Preferensi ini hanya memengaruhi tindakan yang dilakukan oleh layanan prediksi internal $1. Ini tidak memengaruhi prefetch atau preconnect yang dimulai oleh halaman web.'
    webrtc:
        default: Bawaan
        default_public_and_private_interfaces: Antarmuka Publik dan Privat
        default_public_interface_only: Hanya Antarmuka Publik
        disable_non_proxied_udp: Nonaktifkan UDP Non-Proksi
