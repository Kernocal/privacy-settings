extension:
    name: Настройки конфиденциальности
    description: Управление настройками конфиденциальности браузера.
    description_chrome: Управление внутренними настройками конфиденциальности Chrome.
    description_edge: Управление внутренними настройками конфиденциальности Edge.
    chrome_name: Настройки конфиденциальности Chrome
    edge_name: Настройки конфиденциальности Edge
sidepanel:
    heading: Внутренние настройки конфиденциальности браузера
    disclaimer: 'Отказ от ответственности:'
    disclaimerText: Это расширение не связано с $1.
    managedText: Все настройки управляются внутри браузера с помощью API расширения browser.privacy.
    learnMore: Узнать больше об API browser.privacy
    defaultLabel: 'По умолчанию:'
    on: Вкл
    off: Выкл
settings:
    services:
        label: Сервисы
        description: 'Настройки, которые включают или отключают функции, требующие сторонних сетевых сервисов, предоставляемых $2 и вашей поисковой системой по умолчанию.'
        autofillAddressEnabled:
            label: Автозаполнение адреса
            description: 'Если включено, $1 предлагает автоматически заполнять адреса и другие данные форм.'
        autofillCreditCardEnabled:
            label: Автозаполнение кредитной карты
            description: 'Если включено, $1 предлагает автоматически заполнять формы кредитных карт.'
        passwordSavingEnabled:
            label: Сохранение паролей
            description: 'Если включено, менеджер паролей будет спрашивать, хотите ли вы сохранить пароли.'
        searchSuggestEnabled:
            label: Поисковые подсказки
            description: 'Если включено, $1 отправляет текст, который вы вводите в Omnibox, вашей поисковой системе по умолчанию, которая предоставляет подсказки веб-сайтов и поисковых запросов, являющихся вероятными продолжениями того, что вы уже ввели.'
        spellingServiceEnabled:
            label: Служба проверки правописания
            description: 'Если включено, $1 использует веб-сервис для помощи в исправлении орфографических ошибок.'
        translationServiceEnabled:
            label: Служба перевода
            description: 'Если включено, $1 предлагает перевести страницы, написанные не на вашем языке.'
        safeBrowsingEnabled:
            label: Безопасный просмотр
            description: 'Если включено, $1 делает всё возможное для вашей защиты от фишинга и вредоносных программ.'
        safeBrowsingExtendedReportingEnabled:
            label: Расширенные отчёты безопасного просмотра
            description: 'Если включено, $1 отправляет дополнительную информацию в $2, когда SafeBrowsing блокирует страницу, например содержимое заблокированной страницы.'
        alternateErrorPagesEnabled:
            label: Альтернативные страницы ошибок
            description: 'Если включено, $1 использует веб-сервис для помощи в устранении ошибок навигации.'
    websites:
        label: Веб-сайты
        description: 'Настройки, определяющие, какую информацию $1 предоставляет веб-сайтам.'
        doNotTrackEnabled:
            label: Не отслеживать
            description: 'Если включено, $1 отправляет заголовок «Не отслеживать» (DNT: 1) с вашими запросами.'
        thirdPartyCookiesAllowed:
            label: Сторонние файлы cookie разрешены
            description: 'Если отключено, $1 блокирует установку файлов cookie сторонними сайтами. Расширения не могут включить этот API в режиме Incognito, где сторонние файлы cookie заблокированы и могут быть разрешены только на уровне отдельного сайта. Если вы попытаетесь установить этот API в значение true в режиме Incognito, будет выдана ошибка. Примечание: отдельные сайты всё ещё могут получить доступ к сторонним файлам cookie, когда этот API возвращает false, если у них есть допустимое исключение или они используют Storage Access API.'
        hyperlinkAuditingEnabled:
            label: Аудит гиперссылок
            description: 'Если включено, $1 отправляет аудиторские пинги по запросу веб-сайта (<a ping>).'
        protectedContentEnabled:
            label: Защищённый контент
            description: 'Если включено, $1 предоставляет плагинам уникальный идентификатор для воспроизведения защищённого контента.'
        referrersEnabled:
            label: Рефереры
            description: 'Если включено, $1 отправляет заголовки referer с вашими запросами.'
    network:
        label: Сеть
        description: 'Настройки, влияющие на обработку сетевых подключений в $1 в целом.'
        webRTCIPHandlingPolicy:
            label: Политика обработки IP-адресов WebRTC
            description: 'Позволяет пользователям указать компромисс между производительностью и конфиденциальностью медиа, что влияет на маршрутизацию трафика WebRTC и объём раскрываемой информации о локальном адресе.'
        networkPredictionEnabled:
            label: Прогнозирование сети
            description: 'Если включено, $1 пытается ускорить работу в интернете, предварительно разрешая записи DNS и заблаговременно открывая TCP и SSL соединения с серверами. Эта настройка влияет только на действия, выполняемые внутренней службой прогнозирования $1. Она не влияет на предварительную загрузку или предварительные подключения, инициированные веб-страницами.'
    webrtc:
        default: По умолчанию
        default_public_and_private_interfaces: Публичные и частные интерфейсы
        default_public_interface_only: Только публичный интерфейс
        disable_non_proxied_udp: Отключить непроксированный UDP
