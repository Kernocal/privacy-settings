extension:
    name: Privatlivskontrol
    description: Administrer browserens privatlivskontrol.
    description_chrome: "Administrer Chrome's interne privatlivsindstillinger."
    description_edge: "Administrer Edge's interne privatlivsindstillinger."
    chrome_name: Chrome Privatlivskontrol
    edge_name: Edge Privatlivskontrol
sidepanel:
    heading: Interne browser-privatlivskontroller
    disclaimer: 'Ansvarsfraskrivelse:'
    disclaimerText: Denne udvidelse er ikke tilknyttet $1.
    managedText: Alle indstillinger administreres i browseren ved hjælp af browser.privacy udvidelses-API.
    learnMore: Læs mere om browser.privacy API
    defaultLabel: 'Standard:'
    on: Til
    off: Fra
settings:
    services:
        label: Tjenester
        description: 'Indstillinger der aktiverer eller deaktiverer funktioner, som kræver tredjeparts netværkstjenester leveret af $2 og din standardsøgemaskine.'
        autofillAddressEnabled:
            label: Autoudfyld adresse
            description: 'Hvis aktiveret, tilbyder $1 automatisk at udfylde adresser og andre formulardata.'
        autofillCreditCardEnabled:
            label: Autoudfyld kreditkort
            description: 'Hvis aktiveret, tilbyder $1 automatisk at udfylde kreditkortformularer.'
        passwordSavingEnabled:
            label: Gem adgangskoder
            description: 'Hvis aktiveret, spørger adgangskodeadministratoren, om du vil gemme adgangskoder.'
        searchSuggestEnabled:
            label: Søgeforslag
            description: 'Hvis aktiveret, sender $1 den tekst, du skriver i Omnibox, til din standardsøgemaskine, som giver forudsigelser af websteder og søgninger, der sandsynligvis er fuldførelser af det, du har skrevet indtil videre.'
        spellingServiceEnabled:
            label: Stavekontrol-tjeneste
            description: 'Hvis aktiveret, bruger $1 en webtjeneste til at hjælpe med at rette stavefejl.'
        translationServiceEnabled:
            label: Oversættelsestjeneste
            description: 'Hvis aktiveret, tilbyder $1 at oversætte sider, der ikke er på et sprog, du læser.'
        safeBrowsingEnabled:
            label: Sikker browsing
            description: 'Hvis aktiveret, gør $1 sit bedste for at beskytte dig mod phishing og malware.'
        safeBrowsingExtendedReportingEnabled:
            label: Udvidet rapportering for sikker browsing
            description: 'Hvis aktiveret, sender $1 yderligere oplysninger til $2, når SafeBrowsing blokerer en side, såsom indholdet af den blokerede side.'
        alternateErrorPagesEnabled:
            label: Alternative fejlsider
            description: 'Hvis aktiveret, bruger $1 en webtjeneste til at hjælpe med at løse navigationsfejl.'
    websites:
        label: Websteder
        description: 'Indstillinger der bestemmer, hvilke oplysninger $1 gør tilgængelige for websteder.'
        doNotTrackEnabled:
            label: Spor ikke
            description: "Hvis aktiveret, sender $1 'Spor ikke' (DNT: 1) header med dine forespørgsler."
        thirdPartyCookiesAllowed:
            label: Tredjeparts-cookies tilladt
            description: 'Hvis deaktiveret, blokerer $1 tredjepartssider fra at sætte cookies. Udvidelser kan muligvis ikke aktivere denne API i Incognito-tilstand, hvor tredjeparts-cookies er blokeret og kun kan tillades på webstedsniveau. Hvis du forsøger at sætte denne API til sand i Incognito, vil det give en fejl. Bemærk: Individuelle websteder kan stadig have adgang til tredjeparts-cookies, når denne API returnerer falsk, hvis de har en gyldig undtagelse eller bruger Storage Access API i stedet.'
        hyperlinkAuditingEnabled:
            label: Hyperlink-revision
            description: 'Hvis aktiveret, sender $1 revisionspings, når det anmodes af et websted (<a ping>).'
        protectedContentEnabled:
            label: Beskyttet indhold
            description: 'Hvis aktiveret, giver $1 et unikt ID til plugins for at køre beskyttet indhold.'
        referrersEnabled:
            label: Henvisere
            description: 'Hvis aktiveret, sender $1 referer-headere med dine forespørgsler.'
    network:
        label: Netværk
        description: "Indstillinger der påvirker $1's håndtering af netværksforbindelser generelt."
        webRTCIPHandlingPolicy:
            label: WebRTC IP-håndteringspolitik
            description: 'Tillad brugere at specificere afvejningen mellem medieydelse og privatlivsbeskyttelse, som påvirker, hvordan WebRTC-trafik dirigeres, og hvor mange lokale adresseoplysninger der eksponeres.'
        networkPredictionEnabled:
            label: Netværksforudsigelse
            description: "Hvis aktiveret, forsøger $1 at fremskynde din webbrowsingoplevelse ved forudgående at opløse DNS-poster og åbne TCP- og SSL-forbindelser til servere. Denne indstilling påvirker kun handlinger udført af $1's interne forudsigelsestjeneste. Den påvirker ikke websideinitierede forhentninger eller forhåndsforbindelser."
    webrtc:
        default: Standard
        default_public_and_private_interfaces: Offentlige og private grænseflader
        default_public_interface_only: Kun offentlig grænseflade
        disable_non_proxied_udp: Deaktiver ikke-proxyet UDP
