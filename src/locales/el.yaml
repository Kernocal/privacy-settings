extension:
    name: Έλεγχοι Απορρήτου
    description: Διαχείριση των ελέγχων απορρήτου του προγράμματος περιήγησης.
    description_chrome: Διαχείριση των εσωτερικών ρυθμίσεων απορρήτου του Chrome.
    description_edge: Διαχείριση των εσωτερικών ρυθμίσεων απορρήτου του Edge.
    chrome_name: Έλεγχοι Απορρήτου Chrome
    edge_name: Έλεγχοι Απορρήτου Edge
sidepanel:
    heading: Εσωτερικοί Έλεγχοι Απορρήτου Προγράμματος Περιήγησης
    disclaimer: 'Αποποίηση ευθυνών:'
    disclaimerText: Αυτή η επέκταση δεν σχετίζεται με τη $1.
    managedText: Όλες οι ρυθμίσεις διαχειρίζονται εντός του προγράμματος περιήγησης χρησιμοποιώντας το API επέκτασης browser.privacy.
    learnMore: Μάθετε περισσότερα για το API browser.privacy
    defaultLabel: 'Προεπιλογή:'
    on: Ενεργό
    off: Ανενεργό
settings:
    services:
        label: Υπηρεσίες
        description: Ρυθμίσεις που ενεργοποιούν ή απενεργοποιούν λειτουργίες που απαιτούν υπηρεσίες δικτύου τρίτων που παρέχονται από τη $2 και τον προεπιλεγμένο πάροχο αναζήτησής σας.
        autofillAddressEnabled:
            label: Αυτόματη Συμπλήρωση Διεύθυνσης
            description: 'Εάν ενεργοποιηθεί, ο $1 προσφέρει αυτόματη συμπλήρωση διευθύνσεων και άλλων δεδομένων φόρμας.'
        autofillCreditCardEnabled:
            label: Αυτόματη Συμπλήρωση Πιστωτικής Κάρτας
            description: 'Εάν ενεργοποιηθεί, ο $1 προσφέρει αυτόματη συμπλήρωση φορμών πιστωτικής κάρτας.'
        passwordSavingEnabled:
            label: Αποθήκευση Κωδικών Πρόσβασης
            description: 'Εάν ενεργοποιηθεί, ο διαχειριστής κωδικών πρόσβασης θα ρωτήσει αν θέλετε να αποθηκεύσετε κωδικούς πρόσβασης.'
        searchSuggestEnabled:
            label: Προτάσεις Αναζήτησης
            description: 'Εάν ενεργοποιηθεί, ο $1 στέλνει το κείμενο που πληκτρολογείτε στο Omnibox στην προεπιλεγμένη μηχανή αναζήτησής σας, η οποία παρέχει προβλέψεις ιστοσελίδων και αναζητήσεων που είναι πιθανές ολοκληρώσεις αυτών που έχετε πληκτρολογήσει μέχρι στιγμής.'
        spellingServiceEnabled:
            label: Υπηρεσία Ορθογραφίας
            description: 'Εάν ενεργοποιηθεί, ο $1 χρησιμοποιεί μια διαδικτυακή υπηρεσία για τη διόρθωση ορθογραφικών σφαλμάτων.'
        translationServiceEnabled:
            label: Υπηρεσία Μετάφρασης
            description: 'Εάν ενεργοποιηθεί, ο $1 προσφέρει μετάφραση σελίδων που δεν είναι σε γλώσσα που διαβάζετε.'
        safeBrowsingEnabled:
            label: Ασφαλής Περιήγηση
            description: 'Εάν ενεργοποιηθεί, ο $1 κάνει ό,τι μπορεί για να σας προστατέψει από phishing και κακόβουλο λογισμικό.'
        safeBrowsingExtendedReportingEnabled:
            label: Εκτεταμένη Αναφορά Ασφαλούς Περιήγησης
            description: 'Εάν ενεργοποιηθεί, ο $1 θα στέλνει πρόσθετες πληροφορίες στη $2 όταν το SafeBrowsing αποκλείει μια σελίδα, όπως το περιεχόμενο της αποκλεισμένης σελίδας.'
        alternateErrorPagesEnabled:
            label: Εναλλακτικές Σελίδες Σφάλματος
            description: 'Εάν ενεργοποιηθεί, ο $1 χρησιμοποιεί μια διαδικτυακή υπηρεσία για την επίλυση σφαλμάτων πλοήγησης.'
    websites:
        label: Ιστοσελίδες
        description: Ρυθμίσεις που καθορίζουν ποιες πληροφορίες ο $1 κάνει διαθέσιμες στις ιστοσελίδες.
        doNotTrackEnabled:
            label: Μη Παρακολούθηση
            description: "Εάν ενεργοποιηθεί, ο $1 στέλνει κεφαλίδα 'Do Not Track' (DNT: 1) με τα αιτήματά σας."
        thirdPartyCookiesAllowed:
            label: Επιτρεπόμενα Cookies Τρίτων
            description: 'Εάν απενεργοποιηθεί, ο $1 αποκλείει ιστοσελίδες τρίτων από τη ρύθμιση cookies. Οι επεκτάσεις ενδέχεται να μην μπορούν να ενεργοποιήσουν αυτό το API σε λειτουργία Incognito, όπου τα cookies τρίτων αποκλείονται και μπορούν να επιτραπούν μόνο σε επίπεδο ιστοσελίδας. Εάν προσπαθήσετε να ορίσετε αυτό το API σε true σε λειτουργία Incognito, θα εμφανιστεί σφάλμα. Σημείωση: Μεμονωμένες ιστοσελίδες ενδέχεται να μπορούν ακόμα να έχουν πρόσβαση σε cookies τρίτων όταν αυτό το API επιστρέφει false, εάν έχουν έγκυρη εξαίρεση ή χρησιμοποιούν το Storage Access API.'
        hyperlinkAuditingEnabled:
            label: Έλεγχος Υπερσυνδέσμων
            description: 'Εάν ενεργοποιηθεί, ο $1 στέλνει pings ελέγχου όταν ζητηθεί από μια ιστοσελίδα (<a ping>).'
        protectedContentEnabled:
            label: Προστατευμένο Περιεχόμενο
            description: 'Εάν ενεργοποιηθεί, ο $1 παρέχει ένα μοναδικό αναγνωριστικό σε πρόσθετα για την εκτέλεση προστατευμένου περιεχομένου.'
        referrersEnabled:
            label: Παραπομπές
            description: 'Εάν ενεργοποιηθεί, ο $1 στέλνει κεφαλίδες referer με τα αιτήματά σας.'
    network:
        label: Δίκτυο
        description: Ρυθμίσεις που επηρεάζουν τον τρόπο διαχείρισης των συνδέσεων δικτύου από τον $1 γενικά.
        webRTCIPHandlingPolicy:
            label: Πολιτική Διαχείρισης IP WebRTC
            description: Επιτρέπει στους χρήστες να καθορίσουν τις αντισταθμίσεις απόδοσης/απορρήτου πολυμέσων που επηρεάζουν τον τρόπο δρομολόγησης της κίνησης WebRTC και το πόσο εκτίθενται πληροφορίες τοπικής διεύθυνσης.
        networkPredictionEnabled:
            label: Πρόβλεψη Δικτύου
            description: 'Εάν ενεργοποιηθεί, ο $1 προσπαθεί να επιταχύνει την εμπειρία περιήγησής σας επιλύοντας εκ των προτέρων εγγραφές DNS και ανοίγοντας προληπτικά συνδέσεις TCP και SSL σε διακομιστές. Αυτή η προτίμηση επηρεάζει μόνο ενέργειες που εκτελούνται από την εσωτερική υπηρεσία πρόβλεψης του $1. Δεν επηρεάζει προ-ανακτήσεις ή προ-συνδέσεις που ξεκινούν από ιστοσελίδες.'
    webrtc:
        default: Προεπιλογή
        default_public_and_private_interfaces: Δημόσιες και Ιδιωτικές Διεπαφές
        default_public_interface_only: Μόνο Δημόσια Διεπαφή
        disable_non_proxied_udp: Απενεργοποίηση μη Διαμεσολαβούμενου UDP
