extension:
    name: Контроле приватности
    description: Управљајте контролама приватности прегледача.
    description_chrome: Управљајте унутрашњим подешавањима приватности Chrome-а.
    description_edge: Управљајте унутрашњим подешавањима приватности Edge-а.
    chrome_name: Chrome контроле приватности
    edge_name: Edge контроле приватности
sidepanel:
    heading: Унутрашње контроле приватности прегледача
    disclaimer: 'Одрицање од одговорности:'
    disclaimerText: Ово проширење није повезано са $1.
    managedText: Сва подешавања се управљају унутар прегледача помоћу browser.privacy API-ја за проширења.
    learnMore: Сазнајте више о browser.privacy API-ју
    defaultLabel: 'Подразумевано:'
    on: Укључено
    off: Искључено
settings:
    services:
        label: Услуге
        description: Подешавања која омогућавају или онемогућавају функције које захтевају мрежне услуге трећих страна које пружају $2 и ваш подразумевани претраживач.
        autofillAddressEnabled:
            label: Аутоматско попуњавање адресе
            description: 'Ако је омогућено, $1 нуди да аутоматски попуни адресе и друге податке у обрасцима.'
        autofillCreditCardEnabled:
            label: Аутоматско попуњавање кредитне картице
            description: 'Ако је омогућено, $1 нуди да аутоматски попуни обрасце за кредитне картице.'
        passwordSavingEnabled:
            label: Чување лозинки
            description: 'Ако је омогућено, менаџер лозинки ће вас питати да ли желите да сачувате лозинке.'
        searchSuggestEnabled:
            label: Предлози претраге
            description: 'Ако је омогућено, $1 шаље текст који уносите у Omnibox вашем подразумеваном претраживачу, који пружа предвиђања веб-сајтова и претрага које су вероватни завршеци онога што сте до сада унели.'
        spellingServiceEnabled:
            label: Услуга провере правописа
            description: 'Ако је омогућено, $1 користи веб услугу за помоћ при исправљању правописних грешака.'
        translationServiceEnabled:
            label: Услуга превођења
            description: 'Ако је омогућено, $1 нуди да преведе странице које нису на језику који читате.'
        safeBrowsingEnabled:
            label: Безбедно прегледање
            description: 'Ако је омогућено, $1 чини све што може да вас заштити од фишинга и малвера.'
        safeBrowsingExtendedReportingEnabled:
            label: Проширено извештавање безбедног прегледања
            description: 'Ако је омогућено, $1 ће послати додатне информације компанији $2 када SafeBrowsing блокира страницу, као што је садржај блокиране странице.'
        alternateErrorPagesEnabled:
            label: Алтернативне странице грешака
            description: 'Ако је омогућено, $1 користи веб услугу за помоћ при решавању грешака у навигацији.'
    websites:
        label: Веб-сајтови
        description: Подешавања која одређују које информације $1 ставља на располагање веб-сајтовима.
        doNotTrackEnabled:
            label: Не прати
            description: "Ако је омогућено, $1 шаље заглавље 'Do Not Track' (DNT: 1) уз ваше захтеве."
        thirdPartyCookiesAllowed:
            label: Дозвољени колачићи трећих страна
            description: 'Ако је онемогућено, $1 блокира сајтовима трећих страна постављање колачића. Проширења не могу омогућити овај API у Incognito режиму, где су колачићи трећих страна блокирани и могу се дозволити само на нивоу сајта. Ако покушате да подесите овај API на true у Incognito режиму, доћи ће до грешке. Напомена: Појединачни сајтови и даље могу приступити колачићима трећих страна када овај API враћа false, ако имају важеће изузеће или користе Storage Access API.'
        hyperlinkAuditingEnabled:
            label: Ревизија хиперлинкова
            description: 'Ако је омогућено, $1 шаље ревизијске пингове када их веб-сајт затражи (<a ping>).'
        protectedContentEnabled:
            label: Заштићени садржај
            description: 'Ако је омогућено, $1 пружа јединствени ID додацима ради покретања заштићеног садржаја.'
        referrersEnabled:
            label: Упућивачи
            description: 'Ако је омогућено, $1 шаље referer заглавља уз ваше захтеве.'
    network:
        label: Мрежа
        description: Подешавања која утичу на то како $1 управља мрежним везама уопште.
        webRTCIPHandlingPolicy:
            label: Политика руковања WebRTC IP адресама
            description: 'Омогућава корисницима да одреде компромис између перформанси медија и приватности, што утиче на то како ће WebRTC саобраћај бити усмераван и колико информација о локалној адреси је изложено.'
        networkPredictionEnabled:
            label: Предвиђање мреже
            description: 'Ако је омогућено, $1 покушава да убрза ваше прегледање веба унапред решавајући DNS уносе и превентивно отварајући TCP и SSL везе ка серверима. Ово подешавање утиче само на радње које предузима унутрашња услуга предвиђања $1. Не утиче на претходно преузимање или претходно повезивање које покрећу веб-странице.'
    webrtc:
        default: Подразумевано
        default_public_and_private_interfaces: Јавни и приватни интерфејси
        default_public_interface_only: Само јавни интерфејс
        disable_non_proxied_udp: Онемогући UDP без проксија
