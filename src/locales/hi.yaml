extension:
    name: गोपनीयता नियंत्रण
    description: ब्राउज़र की गोपनीयता नियंत्रण प्रबंधित करें।
    description_chrome: Chrome की आंतरिक गोपनीयता सेटिंग्स प्रबंधित करें।
    description_edge: Edge की आंतरिक गोपनीयता सेटिंग्स प्रबंधित करें।
    chrome_name: Chrome गोपनीयता नियंत्रण
    edge_name: Edge गोपनीयता नियंत्रण
sidepanel:
    heading: आंतरिक ब्राउज़र गोपनीयता नियंत्रण
    disclaimer: 'अस्वीकरण:'
    disclaimerText: यह एक्सटेंशन $1 से संबद्ध नहीं है।
    managedText: सभी सेटिंग्स browser.privacy एक्सटेंशन API का उपयोग करके ब्राउज़र के भीतर प्रबंधित की जाती हैं।
    learnMore: browser.privacy API के बारे में अधिक जानें
    defaultLabel: 'डिफ़ॉल्ट:'
    on: चालू
    off: बंद
settings:
    services:
        label: सेवाएँ
        description: $2 और आपके डिफ़ॉल्ट खोज प्रदाता द्वारा प्रदान की जाने वाली तृतीय-पक्ष नेटवर्क सेवाओं की आवश्यकता वाली सुविधाओं को सक्षम या अक्षम करने वाली सेटिंग्स।
        autofillAddressEnabled:
            label: पता स्वतः भरण
            description: 'यदि सक्षम है, तो $1 स्वचालित रूप से पते और अन्य फ़ॉर्म डेटा भरने की पेशकश करता है।'
        autofillCreditCardEnabled:
            label: क्रेडिट कार्ड स्वतः भरण
            description: 'यदि सक्षम है, तो $1 स्वचालित रूप से क्रेडिट कार्ड फ़ॉर्म भरने की पेशकश करता है।'
        passwordSavingEnabled:
            label: पासवर्ड सहेजना
            description: 'यदि सक्षम है, तो पासवर्ड प्रबंधक आपसे पूछेगा कि क्या आप पासवर्ड सहेजना चाहते हैं।'
        searchSuggestEnabled:
            label: खोज सुझाव
            description: 'यदि सक्षम है, तो $1 आपके द्वारा Omnibox में टाइप किए गए टेक्स्ट को आपके डिफ़ॉल्ट खोज इंजन को भेजता है, जो आपके द्वारा अब तक टाइप किए गए टेक्स्ट के संभावित पूर्णता के रूप में वेबसाइटों और खोजों की भविष्यवाणियाँ प्रदान करता है।'
        spellingServiceEnabled:
            label: वर्तनी सेवा
            description: 'यदि सक्षम है, तो $1 वर्तनी त्रुटियों को सही करने में सहायता के लिए एक वेब सेवा का उपयोग करता है।'
        translationServiceEnabled:
            label: अनुवाद सेवा
            description: 'यदि सक्षम है, तो $1 उन पृष्ठों का अनुवाद करने की पेशकश करता है जो आपकी पढ़ी जाने वाली भाषा में नहीं हैं।'
        safeBrowsingEnabled:
            label: सुरक्षित ब्राउज़िंग
            description: 'यदि सक्षम है, तो $1 आपको फ़िशिंग और मैलवेयर से बचाने की पूरी कोशिश करता है।'
        safeBrowsingExtendedReportingEnabled:
            label: सुरक्षित ब्राउज़िंग विस्तारित रिपोर्टिंग
            description: 'यदि सक्षम है, तो जब SafeBrowsing किसी पृष्ठ को अवरुद्ध करता है, तो $1 अवरुद्ध पृष्ठ की सामग्री जैसी अतिरिक्त जानकारी $2 को भेजेगा।'
        alternateErrorPagesEnabled:
            label: वैकल्पिक त्रुटि पृष्ठ
            description: 'यदि सक्षम है, तो $1 नेविगेशन त्रुटियों को हल करने में सहायता के लिए एक वेब सेवा का उपयोग करता है।'
    websites:
        label: वेबसाइटें
        description: वे सेटिंग्स जो निर्धारित करती हैं कि $1 वेबसाइटों को कौन सी जानकारी उपलब्ध कराता है।
        doNotTrackEnabled:
            label: ट्रैक न करें
            description: "यदि सक्षम है, तो $1 आपके अनुरोधों के साथ 'Do Not Track' (DNT: 1) हेडर भेजता है।"
        thirdPartyCookiesAllowed:
            label: तृतीय-पक्ष कुकीज़ अनुमत
            description: 'यदि अक्षम है, तो $1 तृतीय-पक्ष साइटों को कुकीज़ सेट करने से रोकता है। एक्सटेंशन Incognito मोड में इस API को सक्षम नहीं कर सकते, जहाँ तृतीय-पक्ष कुकीज़ अवरुद्ध हैं और केवल साइट स्तर पर अनुमत की जा सकती हैं। यदि आप Incognito में इस API को true पर सेट करने का प्रयास करते हैं, तो यह एक त्रुटि देगा। नोट: जब यह API false लौटाता है, तब भी व्यक्तिगत साइटें तृतीय-पक्ष कुकीज़ तक पहुँच सकती हैं, यदि उनके पास वैध छूट है या वे इसके बजाय Storage Access API का उपयोग करती हैं।'
        hyperlinkAuditingEnabled:
            label: हाइपरलिंक ऑडिटिंग
            description: 'यदि सक्षम है, तो $1 किसी वेबसाइट द्वारा अनुरोध किए जाने पर ऑडिटिंग पिंग भेजता है (<a ping>)।'
        protectedContentEnabled:
            label: संरक्षित सामग्री
            description: 'यदि सक्षम है, तो $1 संरक्षित सामग्री चलाने के लिए प्लगइन्स को एक अद्वितीय ID प्रदान करता है।'
        referrersEnabled:
            label: रेफ़रर
            description: 'यदि सक्षम है, तो $1 आपके अनुरोधों के साथ रेफ़रर हेडर भेजता है।'
    network:
        label: नेटवर्क
        description: वे सेटिंग्स जो सामान्य रूप से $1 के नेटवर्क कनेक्शन संचालन को प्रभावित करती हैं।
        webRTCIPHandlingPolicy:
            label: WebRTC IP हैंडलिंग नीति
            description: उपयोगकर्ताओं को मीडिया प्रदर्शन/गोपनीयता समझौतों को निर्दिष्ट करने की अनुमति दें जो प्रभावित करते हैं कि WebRTC ट्रैफ़िक कैसे रूट किया जाएगा और कितनी स्थानीय पता जानकारी उजागर की जाएगी।
        networkPredictionEnabled:
            label: नेटवर्क पूर्वानुमान
            description: 'यदि सक्षम है, तो $1 DNS प्रविष्टियों को पूर्व-हल करके और सर्वर से TCP और SSL कनेक्शन पूर्व-स्थापित करके आपके वेब ब्राउज़िंग अनुभव को तेज़ करने का प्रयास करता है। यह प्राथमिकता केवल $1 की आंतरिक पूर्वानुमान सेवा द्वारा की गई कार्रवाइयों को प्रभावित करती है। यह वेबपेज द्वारा शुरू किए गए प्रीफ़ेच या प्रीकनेक्ट को प्रभावित नहीं करती।'
    webrtc:
        default: डिफ़ॉल्ट
        default_public_and_private_interfaces: सार्वजनिक और निजी इंटरफ़ेस
        default_public_interface_only: केवल सार्वजनिक इंटरफ़ेस
        disable_non_proxied_udp: गैर-प्रॉक्सीड UDP अक्षम करें
