extension:
    name: การควบคุมความเป็นส่วนตัว
    description: จัดการการควบคุมความเป็นส่วนตัวของเบราว์เซอร์
    description_chrome: จัดการการตั้งค่าความเป็นส่วนตัวภายในของ Chrome
    description_edge: จัดการการตั้งค่าความเป็นส่วนตัวภายในของ Edge
    chrome_name: การควบคุมความเป็นส่วนตัวของ Chrome
    edge_name: การควบคุมความเป็นส่วนตัวของ Edge
sidepanel:
    heading: การควบคุมความเป็นส่วนตัวภายในเบราว์เซอร์
    disclaimer: 'ข้อจำกัดความรับผิดชอบ:'
    disclaimerText: ส่วนขยายนี้ไม่มีความเกี่ยวข้องกับ $1
    managedText: การตั้งค่าทั้งหมดจัดการภายในเบราว์เซอร์โดยใช้ browser.privacy extension API
    learnMore: เรียนรู้เพิ่มเติมเกี่ยวกับ browser.privacy API
    defaultLabel: 'ค่าเริ่มต้น:'
    on: เปิด
    off: ปิด
settings:
    services:
        label: บริการ
        description: การตั้งค่าที่เปิดหรือปิดใช้งานฟีเจอร์ที่ต้องใช้บริการเครือข่ายจากบุคคลที่สามซึ่งจัดทำโดย $2 และผู้ให้บริการค้นหาเริ่มต้นของคุณ
        autofillAddressEnabled:
            label: กรอกที่อยู่อัตโนมัติ
            description: หากเปิดใช้งาน $1 จะเสนอกรอกที่อยู่และข้อมูลแบบฟอร์มอื่น ๆ ให้โดยอัตโนมัติ
        autofillCreditCardEnabled:
            label: กรอกบัตรเครดิตอัตโนมัติ
            description: หากเปิดใช้งาน $1 จะเสนอกรอกแบบฟอร์มบัตรเครดิตให้โดยอัตโนมัติ
        passwordSavingEnabled:
            label: บันทึกรหัสผ่าน
            description: หากเปิดใช้งาน ตัวจัดการรหัสผ่านจะถามว่าคุณต้องการบันทึกรหัสผ่านหรือไม่
        searchSuggestEnabled:
            label: คำแนะนำการค้นหา
            description: หากเปิดใช้งาน $1 จะส่งข้อความที่คุณพิมพ์ใน Omnibox ไปยังเครื่องมือค้นหาเริ่มต้นของคุณ ซึ่งจะให้คำทำนายเว็บไซต์และการค้นหาที่น่าจะเป็นการเติมข้อความที่คุณพิมพ์ไปแล้วให้สมบูรณ์
        spellingServiceEnabled:
            label: บริการตรวจสอบการสะกด
            description: หากเปิดใช้งาน $1 จะใช้บริการเว็บเพื่อช่วยแก้ไขข้อผิดพลาดในการสะกดคำ
        translationServiceEnabled:
            label: บริการแปลภาษา
            description: หากเปิดใช้งาน $1 จะเสนอแปลหน้าเว็บที่ไม่ใช่ภาษาที่คุณอ่าน
        safeBrowsingEnabled:
            label: การท่องเว็บอย่างปลอดภัย
            description: หากเปิดใช้งาน $1 จะพยายามอย่างเต็มที่เพื่อปกป้องคุณจากฟิชชิงและมัลแวร์
        safeBrowsingExtendedReportingEnabled:
            label: การรายงานเพิ่มเติมของการท่องเว็บอย่างปลอดภัย
            description: หากเปิดใช้งาน $1 จะส่งข้อมูลเพิ่มเติมไปยัง $2 เมื่อ SafeBrowsing บล็อกหน้าเว็บ เช่น เนื้อหาของหน้าเว็บที่ถูกบล็อก
        alternateErrorPagesEnabled:
            label: หน้าข้อผิดพลาดทางเลือก
            description: หากเปิดใช้งาน $1 จะใช้บริการเว็บเพื่อช่วยแก้ไขข้อผิดพลาดในการนำทาง
    websites:
        label: เว็บไซต์
        description: การตั้งค่าที่กำหนดว่า $1 จะให้ข้อมูลใดแก่เว็บไซต์
        doNotTrackEnabled:
            label: ไม่ต้องติดตาม
            description: "หากเปิดใช้งาน $1 จะส่งส่วนหัว 'Do Not Track' (DNT: 1) พร้อมกับคำขอของคุณ"
        thirdPartyCookiesAllowed:
            label: อนุญาตคุกกี้จากบุคคลที่สาม
            description: 'หากปิดใช้งาน $1 จะบล็อกไม่ให้เว็บไซต์บุคคลที่สามตั้งค่าคุกกี้ ส่วนขยายไม่สามารถเปิดใช้งาน API นี้ในโหมด Incognito ซึ่งคุกกี้จากบุคคลที่สามถูกบล็อกและสามารถอนุญาตได้เฉพาะในระดับเว็บไซต์เท่านั้น หากคุณพยายามตั้งค่า API นี้เป็น true ในโหมด Incognito จะเกิดข้อผิดพลาด หมายเหตุ: เว็บไซต์แต่ละแห่งอาจยังสามารถเข้าถึงคุกกี้จากบุคคลที่สามได้เมื่อ API นี้คืนค่า false หากมีการยกเว้นที่ถูกต้องหรือใช้ Storage Access API แทน'
        hyperlinkAuditingEnabled:
            label: การตรวจสอบไฮเปอร์ลิงก์
            description: หากเปิดใช้งาน $1 จะส่งพิงการตรวจสอบเมื่อเว็บไซต์ร้องขอ (<a ping>)
        protectedContentEnabled:
            label: เนื้อหาที่ได้รับการป้องกัน
            description: หากเปิดใช้งาน $1 จะให้รหัสเฉพาะแก่ปลั๊กอินเพื่อเรียกใช้เนื้อหาที่ได้รับการป้องกัน
        referrersEnabled:
            label: ผู้อ้างอิง
            description: หากเปิดใช้งาน $1 จะส่งส่วนหัวผู้อ้างอิงพร้อมกับคำขอของคุณ
    network:
        label: เครือข่าย
        description: การตั้งค่าที่มีผลต่อการจัดการการเชื่อมต่อเครือข่ายโดยทั่วไปของ $1
        webRTCIPHandlingPolicy:
            label: นโยบายการจัดการ IP ของ WebRTC
            description: อนุญาตให้ผู้ใช้ระบุการแลกเปลี่ยนระหว่างประสิทธิภาพสื่อและความเป็นส่วนตัว ซึ่งมีผลต่อวิธีการกำหนดเส้นทางทราฟฟิก WebRTC และปริมาณข้อมูลที่อยู่ภายในที่ถูกเปิดเผย
        networkPredictionEnabled:
            label: การทำนายเครือข่าย
            description: หากเปิดใช้งาน $1 จะพยายามเพิ่มความเร็วประสบการณ์การท่องเว็บของคุณโดยการแก้ไขรายการ DNS ล่วงหน้าและเปิดการเชื่อมต่อ TCP และ SSL ไปยังเซิร์ฟเวอร์ล่วงหน้า การตั้งค่านี้มีผลเฉพาะกับการดำเนินการที่ทำโดยบริการทำนายภายในของ $1 เท่านั้น ไม่มีผลต่อการดึงข้อมูลล่วงหน้าหรือการเชื่อมต่อล่วงหน้าที่เริ่มต้นโดยหน้าเว็บ
    webrtc:
        default: ค่าเริ่มต้น
        default_public_and_private_interfaces: อินเทอร์เฟซสาธารณะและส่วนตัว
        default_public_interface_only: อินเทอร์เฟซสาธารณะเท่านั้น
        disable_non_proxied_udp: ปิดใช้งาน UDP ที่ไม่ผ่านพร็อกซี
