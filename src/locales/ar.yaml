extension:
    name: عناصر التحكم بالخصوصية
    description: إدارة عناصر التحكم بخصوصية المتصفح.
    description_chrome: إدارة إعدادات الخصوصية الداخلية في Chrome.
    description_edge: إدارة إعدادات الخصوصية الداخلية في Edge.
    chrome_name: عناصر التحكم بخصوصية Chrome
    edge_name: عناصر التحكم بخصوصية Edge
sidepanel:
    heading: عناصر التحكم الداخلية بخصوصية المتصفح
    disclaimer: 'إخلاء مسؤولية:'
    disclaimerText: هذا الامتداد غير تابع لـ $1.
    managedText: تتم إدارة جميع الإعدادات داخل المتصفح باستخدام browser.privacy API الخاص بالامتدادات.
    learnMore: تعرّف على المزيد حول browser.privacy API
    defaultLabel: 'الافتراضي:'
    on: تشغيل
    off: إيقاف
settings:
    services:
        label: الخدمات
        description: إعدادات تُفعّل أو تُعطّل الميزات التي تتطلب خدمات شبكة من جهات خارجية يوفرها $2 ومزود البحث الافتراضي لديك.
        autofillAddressEnabled:
            label: الملء التلقائي للعنوان
            description: عند التفعيل، يعرض $1 ملء العناوين وبيانات النماذج الأخرى تلقائيًا.
        autofillCreditCardEnabled:
            label: الملء التلقائي لبطاقة الائتمان
            description: عند التفعيل، يعرض $1 ملء نماذج بطاقات الائتمان تلقائيًا.
        passwordSavingEnabled:
            label: حفظ كلمات المرور
            description: عند التفعيل، يسألك مدير كلمات المرور عمّا إذا كنت تريد حفظ كلمات المرور.
        searchSuggestEnabled:
            label: اقتراحات البحث
            description: عند التفعيل، يرسل $1 النص الذي تكتبه في Omnibox إلى محرك البحث الافتراضي لديك، والذي يقدم توقعات لمواقع ويب وعمليات بحث من المحتمل أن تكون إكمالات لما كتبته حتى الآن.
        spellingServiceEnabled:
            label: خدمة التدقيق الإملائي
            description: عند التفعيل، يستخدم $1 خدمة ويب للمساعدة في تصحيح الأخطاء الإملائية.
        translationServiceEnabled:
            label: خدمة الترجمة
            description: عند التفعيل، يعرض $1 ترجمة الصفحات التي ليست بلغة تقرأها.
        safeBrowsingEnabled:
            label: التصفح الآمن
            description: عند التفعيل، يبذل $1 قصارى جهده لحمايتك من التصيّد الاحتيالي والبرامج الضارة.
        safeBrowsingExtendedReportingEnabled:
            label: التقارير الموسّعة للتصفح الآمن
            description: عند التفعيل، يرسل $1 معلومات إضافية إلى $2 عندما يحظر SafeBrowsing صفحة ما، مثل محتوى الصفحة المحظورة.
        alternateErrorPagesEnabled:
            label: صفحات الأخطاء البديلة
            description: عند التفعيل، يستخدم $1 خدمة ويب للمساعدة في حل أخطاء التنقل.
    websites:
        label: مواقع الويب
        description: إعدادات تحدد المعلومات التي يتيحها $1 لمواقع الويب.
        doNotTrackEnabled:
            label: عدم التتبع
            description: "عند التفعيل، يرسل $1 ترويسة 'عدم التتبع' (DNT: 1) مع طلباتك."
        thirdPartyCookiesAllowed:
            label: السماح بملفات تعريف الارتباط للجهات الخارجية
            description: 'عند التعطيل، يحظر $1 مواقع الجهات الخارجية من تعيين ملفات تعريف الارتباط. لا يمكن للامتدادات تفعيل هذا API في وضع Incognito، حيث تكون ملفات تعريف الارتباط للجهات الخارجية محظورة ولا يمكن السماح بها إلا على مستوى الموقع. إذا حاولت تعيين هذا API إلى true في وضع Incognito، فسيُطرح خطأ. ملاحظة: قد تتمكن المواقع الفردية من الوصول إلى ملفات تعريف الارتباط للجهات الخارجية عندما يُرجع هذا API القيمة false، إذا كان لديها إعفاء صالح أو استخدمت Storage Access API بدلاً من ذلك.'
        hyperlinkAuditingEnabled:
            label: تدقيق الروابط التشعبية
            description: عند التفعيل، يرسل $1 إشارات تدقيق عندما يطلبها موقع ويب (<a ping>).
        protectedContentEnabled:
            label: المحتوى المحمي
            description: عند التفعيل، يوفر $1 معرّفًا فريدًا للإضافات لتشغيل المحتوى المحمي.
        referrersEnabled:
            label: المُحيلون
            description: عند التفعيل، يرسل $1 ترويسات المُحيل مع طلباتك.
    network:
        label: الشبكة
        description: إعدادات تؤثر على كيفية تعامل $1 مع اتصالات الشبكة بشكل عام.
        webRTCIPHandlingPolicy:
            label: سياسة معالجة عنوان IP في WebRTC
            description: السماح للمستخدمين بتحديد المفاضلات بين الأداء والخصوصية في الوسائط، مما يؤثر على كيفية توجيه حركة مرور WebRTC ومقدار معلومات العنوان المحلي المكشوفة.
        networkPredictionEnabled:
            label: التنبؤ بالشبكة
            description: عند التفعيل، يحاول $1 تسريع تجربة تصفح الويب عن طريق الاستعلام المسبق عن إدخالات DNS وفتح اتصالات TCP وSSL بالخوادم بشكل استباقي. يؤثر هذا الإعداد فقط على الإجراءات التي تتخذها خدمة التنبؤ الداخلية في $1. ولا يؤثر على عمليات الجلب المسبق أو الاتصال المسبق التي تبدأها صفحات الويب.
    webrtc:
        default: افتراضي
        default_public_and_private_interfaces: الواجهات العامة والخاصة
        default_public_interface_only: الواجهة العامة فقط
        disable_non_proxied_udp: تعطيل UDP غير الموجّه عبر الوكيل
