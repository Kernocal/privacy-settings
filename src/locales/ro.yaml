extension:
    name: Controale de Confidențialitate
    description: Gestionează controalele de confidențialitate ale browserului.
    description_chrome: Gestionează setările interne de confidențialitate ale Chrome.
    description_edge: Gestionează setările interne de confidențialitate ale Edge.
    chrome_name: Controale de Confidențialitate Chrome
    edge_name: Controale de Confidențialitate Edge
sidepanel:
    heading: Controale Interne de Confidențialitate ale Browserului
    disclaimer: 'Avertisment:'
    disclaimerText: Această extensie nu este afiliată cu $1.
    managedText: Toate setările sunt gestionate în cadrul browserului folosind browser.privacy API pentru extensii.
    learnMore: Află mai multe despre browser.privacy API
    defaultLabel: 'Implicit:'
    on: Activat
    off: Dezactivat
settings:
    services:
        label: Servicii
        description: Setări care activează sau dezactivează funcții ce necesită servicii de rețea terțe furnizate de $2 și motorul de căutare implicit.
        autofillAddressEnabled:
            label: Completare Automată Adresă
            description: 'Dacă este activat, $1 oferă completarea automată a adreselor și a altor date din formulare.'
        autofillCreditCardEnabled:
            label: Completare Automată Card de Credit
            description: 'Dacă este activat, $1 oferă completarea automată a formularelor de card de credit.'
        passwordSavingEnabled:
            label: Salvare Parole
            description: 'Dacă este activat, managerul de parole va întreba dacă doriți să salvați parolele.'
        searchSuggestEnabled:
            label: Sugestii de Căutare
            description: 'Dacă este activat, $1 trimite textul pe care îl tastați în Omnibox către motorul de căutare implicit, care oferă predicții ale site-urilor web și căutărilor care sunt probabile completări ale textului tastat până acum.'
        spellingServiceEnabled:
            label: Serviciu de Ortografie
            description: 'Dacă este activat, $1 folosește un serviciu web pentru a corecta erorile de ortografie.'
        translationServiceEnabled:
            label: Serviciu de Traducere
            description: 'Dacă este activat, $1 oferă traducerea paginilor care nu sunt într-o limbă pe care o citiți.'
        safeBrowsingEnabled:
            label: Navigare Sigură
            description: 'Dacă este activat, $1 face tot posibilul să vă protejeze de phishing și malware.'
        safeBrowsingExtendedReportingEnabled:
            label: Raportare Extinsă Navigare Sigură
            description: 'Dacă este activat, $1 va trimite informații suplimentare către $2 atunci când SafeBrowsing blochează o pagină, cum ar fi conținutul paginii blocate.'
        alternateErrorPagesEnabled:
            label: Pagini Alternative de Eroare
            description: 'Dacă este activat, $1 folosește un serviciu web pentru a rezolva erorile de navigare.'
    websites:
        label: Site-uri Web
        description: Setări care determină ce informații pune $1 la dispoziția site-urilor web.
        doNotTrackEnabled:
            label: Nu Urmări
            description: "Dacă este activat, $1 trimite antetul 'Do Not Track' (DNT: 1) cu cererile dumneavoastră."
        thirdPartyCookiesAllowed:
            label: Cookie-uri Terțe Permise
            description: 'Dacă este dezactivat, $1 blochează site-urile terțe să seteze cookie-uri. Extensiile nu pot activa acest API în modul Incognito, unde cookie-urile terțe sunt blocate și pot fi permise doar la nivel de site. Dacă încercați să setați acest API la true în Incognito, va genera o eroare. Notă: Site-urile individuale pot totuși accesa cookie-uri terțe atunci când acest API returnează false, dacă au o excepție validă sau folosesc Storage Access API.'
        hyperlinkAuditingEnabled:
            label: Auditare Hyperlinkuri
            description: 'Dacă este activat, $1 trimite pinguri de auditare atunci când sunt solicitate de un site web (<a ping>).'
        protectedContentEnabled:
            label: Conținut Protejat
            description: 'Dacă este activat, $1 furnizează un ID unic pluginurilor pentru a rula conținut protejat.'
        referrersEnabled:
            label: Referenți
            description: 'Dacă este activat, $1 trimite antete referer cu cererile dumneavoastră.'
    network:
        label: Rețea
        description: Setări care influențează modul în care $1 gestionează conexiunile de rețea în general.
        webRTCIPHandlingPolicy:
            label: Politica de Gestionare IP WebRTC
            description: Permite utilizatorilor să specifice compromisurile performanță/confidențialitate media care influențează modul în care traficul WebRTC va fi direcționat și cât de multe informații despre adresa locală sunt expuse.
        networkPredictionEnabled:
            label: Predicție de Rețea
            description: 'Dacă este activat, $1 încearcă să accelereze experiența de navigare web prin pre-rezolvarea intrărilor DNS și deschiderea preventivă a conexiunilor TCP și SSL către servere. Această preferință afectează doar acțiunile întreprinse de serviciul intern de predicție al $1. Nu afectează preîncărcările sau preconexiunile inițiate de paginile web.'
    webrtc:
        default: Implicit
        default_public_and_private_interfaces: Interfețe Publice și Private
        default_public_interface_only: Doar Interfața Publică
        disable_non_proxied_udp: Dezactivare UDP Neproxyat
