extension:
    name: Personverninnstillinger
    description: Administrer nettleserens personverninnstillinger.
    description_chrome: Administrer Chrome sine interne personverninnstillinger.
    description_edge: Administrer Edge sine interne personverninnstillinger.
    chrome_name: Chrome Personverninnstillinger
    edge_name: Edge Personverninnstillinger
sidepanel:
    heading: Interne personverninnstillinger for nettleser
    disclaimer: 'Ansvarsfraskrivelse:'
    disclaimerText: Denne utvidelsen er ikke tilknyttet $1.
    managedText: Alle innstillinger administreres i nettleseren ved hjelp av browser.privacy utvidelses-API.
    learnMore: Lær mer om browser.privacy API
    defaultLabel: 'Standard:'
    on: På
    off: Av
settings:
    services:
        label: Tjenester
        description: Innstillinger som aktiverer eller deaktiverer funksjoner som krever tredjeparts nettverkstjenester levert av $2 og din standard søkeleverandør.
        autofillAddressEnabled:
            label: Autoutfylling av adresse
            description: 'Hvis aktivert, tilbyr $1 å automatisk fylle inn adresser og andre skjemadata.'
        autofillCreditCardEnabled:
            label: Autoutfylling av kredittkort
            description: 'Hvis aktivert, tilbyr $1 å automatisk fylle inn kredittkortskjemaer.'
        passwordSavingEnabled:
            label: Passordlagring
            description: 'Hvis aktivert, spør passordbehandleren om du vil lagre passord.'
        searchSuggestEnabled:
            label: Søkeforslag
            description: 'Hvis aktivert, sender $1 teksten du skriver i Omnibox til din standard søkemotor, som gir forutsigelser av nettsteder og søk som sannsynligvis er fullføringer av det du har skrevet så langt.'
        spellingServiceEnabled:
            label: Stavekontrolltjeneste
            description: 'Hvis aktivert, bruker $1 en nettjeneste for å hjelpe med å rette stavefeil.'
        translationServiceEnabled:
            label: Oversettelsestjeneste
            description: 'Hvis aktivert, tilbyr $1 å oversette sider som ikke er på et språk du leser.'
        safeBrowsingEnabled:
            label: Sikker surfing
            description: 'Hvis aktivert, gjør $1 sitt beste for å beskytte deg mot phishing og skadelig programvare.'
        safeBrowsingExtendedReportingEnabled:
            label: Utvidet rapportering for sikker surfing
            description: 'Hvis aktivert, sender $1 tilleggsinformasjon til $2 når SafeBrowsing blokkerer en side, som for eksempel innholdet på den blokkerte siden.'
        alternateErrorPagesEnabled:
            label: Alternative feilsider
            description: 'Hvis aktivert, bruker $1 en nettjeneste for å hjelpe med å løse navigasjonsfeil.'
    websites:
        label: Nettsteder
        description: Innstillinger som bestemmer hvilken informasjon $1 gjør tilgjengelig for nettsteder.
        doNotTrackEnabled:
            label: Ikke spor
            description: "Hvis aktivert, sender $1 'Ikke spor' (DNT: 1)-overskrift med forespørslene dine."
        thirdPartyCookiesAllowed:
            label: Tredjeparts informasjonskapsler tillatt
            description: 'Hvis deaktivert, blokkerer $1 tredjeparts nettsteder fra å sette informasjonskapsler. Utvidelser kan ikke aktivere dette API i Incognito-modus, der tredjeparts informasjonskapsler er blokkert og kun kan tillates på nettstedsnivå. Hvis du prøver å sette dette API til sann i Incognito, vil det gi en feil. Merk: Individuelle nettsteder kan fortsatt få tilgang til tredjeparts informasjonskapsler når dette API returnerer usann, hvis de har et gyldig unntak eller bruker Storage Access API i stedet.'
        hyperlinkAuditingEnabled:
            label: Hyperkoblingsrevisjon
            description: 'Hvis aktivert, sender $1 revisjonspinger når det blir forespurt av et nettsted (<a ping>).'
        protectedContentEnabled:
            label: Beskyttet innhold
            description: 'Hvis aktivert, gir $1 en unik ID til programtillegg for å kjøre beskyttet innhold.'
        referrersEnabled:
            label: Henvisningsadresser
            description: 'Hvis aktivert, sender $1 henvisningsoverskrifter med forespørslene dine.'
    network:
        label: Nettverk
        description: Innstillinger som påvirker $1 sin håndtering av nettverkstilkoblinger generelt.
        webRTCIPHandlingPolicy:
            label: WebRTC IP-håndteringspolicy
            description: 'Lar brukere spesifisere avveiningen mellom medieytelse og personvern, som påvirker hvordan WebRTC-trafikk rutes og hvor mye lokal adresseinformasjon som eksponeres.'
        networkPredictionEnabled:
            label: Nettverksprediksjon
            description: 'Hvis aktivert, forsøker $1 å øke hastigheten på nettleseropplevelsen din ved å forhåndsoppløse DNS-oppføringer og forebyggende åpne TCP- og SSL-tilkoblinger til servere. Denne innstillingen påvirker kun handlinger utført av $1 sin interne prediksjonstjeneste. Den påvirker ikke forhåndshenting eller forhåndstilkoblinger initiert av nettsider.'
    webrtc:
        default: Standard
        default_public_and_private_interfaces: Offentlige og private grensesnitt
        default_public_interface_only: Kun offentlig grensesnitt
        disable_non_proxied_udp: Deaktiver ikke-proxyet UDP
