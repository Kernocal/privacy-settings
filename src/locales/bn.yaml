extension:
    name: গোপনীয়তা নিয়ন্ত্রণ
    description: ব্রাউজারের গোপনীয়তা নিয়ন্ত্রণগুলি পরিচালনা করুন।
    description_chrome: Chrome-এর অভ্যন্তরীণ গোপনীয়তা সেটিংস পরিচালনা করুন।
    description_edge: Edge-এর অভ্যন্তরীণ গোপনীয়তা সেটিংস পরিচালনা করুন।
    chrome_name: Chrome গোপনীয়তা নিয়ন্ত্রণ
    edge_name: Edge গোপনীয়তা নিয়ন্ত্রণ
sidepanel:
    heading: অভ্যন্তরীণ ব্রাউজার গোপনীয়তা নিয়ন্ত্রণ
    disclaimer: 'দায়িত্বসীমা:'
    disclaimerText: এই এক্সটেনশনটি $1-এর সাথে সম্পর্কিত নয়।
    managedText: সমস্ত সেটিংস browser.privacy এক্সটেনশন API ব্যবহার করে ব্রাউজারের মধ্যে পরিচালিত হয়।
    learnMore: browser.privacy API সম্পর্কে আরও জানুন
    defaultLabel: 'ডিফল্ট:'
    on: চালু
    off: বন্ধ
settings:
    services:
        label: পরিষেবা
        description: $2 এবং আপনার ডিফল্ট সার্চ প্রদানকারী দ্বারা সরবরাহকৃত তৃতীয়-পক্ষের নেটওয়ার্ক পরিষেবা প্রয়োজন এমন বৈশিষ্ট্যগুলি সক্রিয় বা নিষ্ক্রিয় করার সেটিংস।
        autofillAddressEnabled:
            label: ঠিকানা স্বয়ংপূরণ
            description: 'সক্রিয় থাকলে, $1 স্বয়ংক্রিয়ভাবে ঠিকানা এবং অন্যান্য ফর্ম ডেটা পূরণ করার প্রস্তাব দেয়।'
        autofillCreditCardEnabled:
            label: ক্রেডিট কার্ড স্বয়ংপূরণ
            description: 'সক্রিয় থাকলে, $1 স্বয়ংক্রিয়ভাবে ক্রেডিট কার্ড ফর্ম পূরণ করার প্রস্তাব দেয়।'
        passwordSavingEnabled:
            label: পাসওয়ার্ড সংরক্ষণ
            description: 'সক্রিয় থাকলে, পাসওয়ার্ড ম্যানেজার আপনাকে পাসওয়ার্ড সংরক্ষণ করতে চান কিনা জিজ্ঞাসা করবে।'
        searchSuggestEnabled:
            label: সার্চ পরামর্শ
            description: 'সক্রিয় থাকলে, $1 আপনি Omnibox-এ যা টাইপ করেন তা আপনার ডিফল্ট সার্চ ইঞ্জিনে পাঠায়, যা আপনি এখন পর্যন্ত যা টাইপ করেছেন তার সম্ভাব্য সম্পূর্ণতা হিসেবে ওয়েবসাইট এবং সার্চের পূর্বাভাস প্রদান করে।'
        spellingServiceEnabled:
            label: বানান পরিষেবা
            description: 'সক্রিয় থাকলে, $1 বানান ত্রুটি সংশোধনে সাহায্য করতে একটি ওয়েব পরিষেবা ব্যবহার করে।'
        translationServiceEnabled:
            label: অনুবাদ পরিষেবা
            description: 'সক্রিয় থাকলে, $1 আপনি পড়েন না এমন ভাষার পৃষ্ঠাগুলি অনুবাদ করার প্রস্তাব দেয়।'
        safeBrowsingEnabled:
            label: নিরাপদ ব্রাউজিং
            description: 'সক্রিয় থাকলে, $1 ফিশিং এবং ম্যালওয়্যার থেকে আপনাকে রক্ষা করতে সর্বোচ্চ চেষ্টা করে।'
        safeBrowsingExtendedReportingEnabled:
            label: নিরাপদ ব্রাউজিং বর্ধিত রিপোর্টিং
            description: 'সক্রিয় থাকলে, SafeBrowsing কোনো পৃষ্ঠা ব্লক করলে $1 $2-এ অতিরিক্ত তথ্য পাঠাবে, যেমন ব্লক করা পৃষ্ঠার বিষয়বস্তু।'
        alternateErrorPagesEnabled:
            label: বিকল্প ত্রুটি পৃষ্ঠা
            description: 'সক্রিয় থাকলে, $1 নেভিগেশন ত্রুটি সমাধানে সাহায্য করতে একটি ওয়েব পরিষেবা ব্যবহার করে।'
    websites:
        label: ওয়েবসাইট
        description: $1 ওয়েবসাইটগুলিতে কোন তথ্য উপলব্ধ করে তা নির্ধারণ করার সেটিংস।
        doNotTrackEnabled:
            label: ট্র্যাক করবেন না
            description: "সক্রিয় থাকলে, $1 আপনার অনুরোধের সাথে 'Do Not Track' (DNT: 1) হেডার পাঠায়।"
        thirdPartyCookiesAllowed:
            label: তৃতীয়-পক্ষের কুকি অনুমোদিত
            description: 'নিষ্ক্রিয় থাকলে, $1 তৃতীয়-পক্ষের সাইটগুলিকে কুকি সেট করা থেকে ব্লক করে। এক্সটেনশনগুলি Incognito মোডে এই API সক্রিয় করতে পারে না, যেখানে তৃতীয়-পক্ষের কুকি ব্লক করা থাকে এবং শুধুমাত্র সাইট স্তরে অনুমোদন করা যায়। আপনি যদি Incognito-তে এই API true সেট করার চেষ্টা করেন, এটি একটি ত্রুটি দেখাবে। দ্রষ্টব্য: এই API false ফেরত দিলেও পৃথক সাইটগুলি তৃতীয়-পক্ষের কুকি অ্যাক্সেস করতে সক্ষম হতে পারে, যদি তাদের একটি বৈধ ছাড় থাকে বা তারা পরিবর্তে Storage Access API ব্যবহার করে।'
        hyperlinkAuditingEnabled:
            label: হাইপারলিঙ্ক অডিটিং
            description: 'সক্রিয় থাকলে, কোনো ওয়েবসাইট অনুরোধ করলে $1 অডিটিং পিং পাঠায় (<a ping>)।'
        protectedContentEnabled:
            label: সুরক্ষিত সামগ্রী
            description: 'সক্রিয় থাকলে, $1 সুরক্ষিত সামগ্রী চালানোর জন্য প্লাগইনগুলিকে একটি অনন্য আইডি প্রদান করে।'
        referrersEnabled:
            label: রেফারার
            description: 'সক্রিয় থাকলে, $1 আপনার অনুরোধের সাথে রেফারার হেডার পাঠায়।'
    network:
        label: নেটওয়ার্ক
        description: সাধারণভাবে $1-এর নেটওয়ার্ক সংযোগ পরিচালনাকে প্রভাবিত করে এমন সেটিংস।
        webRTCIPHandlingPolicy:
            label: WebRTC IP পরিচালনা নীতি
            description: ব্যবহারকারীদের মিডিয়া কর্মক্ষমতা/গোপনীয়তার ভারসাম্য নির্ধারণ করতে দেয় যা WebRTC ট্র্যাফিক কীভাবে রুট করা হবে এবং কতটা স্থানীয় ঠিকানা তথ্য প্রকাশ করা হবে তা প্রভাবিত করে।
        networkPredictionEnabled:
            label: নেটওয়ার্ক পূর্বাভাস
            description: 'সক্রিয় থাকলে, $1 DNS এন্ট্রি পূর্ব-সমাধান এবং সার্ভারগুলিতে আগে থেকেই TCP ও SSL সংযোগ খুলে আপনার ওয়েব ব্রাউজিং অভিজ্ঞতা দ্রুত করার চেষ্টা করে। এই পছন্দটি শুধুমাত্র $1-এর অভ্যন্তরীণ পূর্বাভাস পরিষেবা দ্বারা গৃহীত পদক্ষেপগুলিকে প্রভাবিত করে। এটি ওয়েবপৃষ্ঠা দ্বারা শুরু করা প্রিফেচ বা প্রিকানেক্টকে প্রভাবিত করে না।'
    webrtc:
        default: ডিফল্ট
        default_public_and_private_interfaces: পাবলিক এবং প্রাইভেট ইন্টারফেস
        default_public_interface_only: শুধুমাত্র পাবলিক ইন্টারফেস
        disable_non_proxied_udp: নন-প্রক্সিড UDP নিষ্ক্রিয় করুন
