extension:
    name: Контрол на поверителността
    description: Управлявайте контролите за поверителност на браузъра.
    description_chrome: Управлявайте вътрешните настройки за поверителност на Chrome.
    description_edge: Управлявайте вътрешните настройки за поверителност на Edge.
    chrome_name: Chrome Контрол на поверителността
    edge_name: Edge Контрол на поверителността
sidepanel:
    heading: Вътрешни контроли за поверителност на браузъра
    disclaimer: 'Отказ от отговорност:'
    disclaimerText: Това разширение не е свързано с $1.
    managedText: Всички настройки се управляват в браузъра чрез разширението browser.privacy API.
    learnMore: Научете повече за browser.privacy API
    defaultLabel: 'По подразбиране:'
    on: Вкл.
    off: Изкл.
settings:
    services:
        label: Услуги
        description: 'Настройки, които включват или изключват функции, изискващи мрежови услуги на трети страни, предоставени от $2 и вашия доставчик на търсене по подразбиране.'
        autofillAddressEnabled:
            label: Автоматично попълване на адрес
            description: 'Ако е включено, $1 предлага автоматично попълване на адреси и други данни от формуляри.'
        autofillCreditCardEnabled:
            label: Автоматично попълване на кредитна карта
            description: 'Ако е включено, $1 предлага автоматично попълване на формуляри за кредитни карти.'
        passwordSavingEnabled:
            label: Запазване на пароли
            description: 'Ако е включено, мениджърът на пароли ще ви попита дали искате да запазите паролите.'
        searchSuggestEnabled:
            label: Предложения при търсене
            description: 'Ако е включено, $1 изпраща текста, който въвеждате в Omnibox, към вашата търсачка по подразбиране, която предоставя прогнози за уебсайтове и търсения, които вероятно допълват написаното от вас досега.'
        spellingServiceEnabled:
            label: Услуга за правопис
            description: 'Ако е включено, $1 използва уеб услуга за помощ при коригиране на правописни грешки.'
        translationServiceEnabled:
            label: Услуга за превод
            description: 'Ако е включено, $1 предлага да преведе страници, които не са на език, който четете.'
        safeBrowsingEnabled:
            label: Безопасно сърфиране
            description: 'Ако е включено, $1 прави всичко възможно да ви предпази от фишинг и злонамерен софтуер.'
        safeBrowsingExtendedReportingEnabled:
            label: Разширено докладване за безопасно сърфиране
            description: 'Ако е включено, $1 ще изпраща допълнителна информация до $2, когато SafeBrowsing блокира страница, като например съдържанието на блокираната страница.'
        alternateErrorPagesEnabled:
            label: Алтернативни страници за грешки
            description: 'Ако е включено, $1 използва уеб услуга за помощ при разрешаване на грешки при навигация.'
    websites:
        label: Уебсайтове
        description: 'Настройки, които определят каква информация $1 предоставя на уебсайтовете.'
        doNotTrackEnabled:
            label: Без проследяване
            description: "Ако е включено, $1 изпраща заглавка 'Do Not Track' (DNT: 1) с вашите заявки."
        thirdPartyCookiesAllowed:
            label: Разрешени бисквитки на трети страни
            description: 'Ако е изключено, $1 блокира сайтовете на трети страни да задават бисквитки. Разширенията не могат да включат този API в режим Incognito, където бисквитките на трети страни са блокирани и могат да бъдат разрешени само на ниво сайт. Ако се опитате да зададете този API на true в Incognito, ще възникне грешка. Забележка: Отделни сайтове все пак може да имат достъп до бисквитки на трети страни, когато този API връща false, ако имат валидно освобождаване или използват Storage Access API вместо това.'
        hyperlinkAuditingEnabled:
            label: Одит на хипервръзки
            description: 'Ако е включено, $1 изпраща одитни пингове при заявка от уебсайт (<a ping>).'
        protectedContentEnabled:
            label: Защитено съдържание
            description: 'Ако е включено, $1 предоставя уникален идентификатор на приставки, за да се изпълнява защитено съдържание.'
        referrersEnabled:
            label: Препращащи заглавки
            description: 'Ако е включено, $1 изпраща referer заглавки с вашите заявки.'
    network:
        label: Мрежа
        description: 'Настройки, които влияят на обработката на мрежовите връзки от $1 като цяло.'
        webRTCIPHandlingPolicy:
            label: Политика за обработка на WebRTC IP
            description: 'Позволява на потребителите да определят компромисите между производителност и поверителност на медията, които влияят на маршрутизирането на WebRTC трафика и колко информация за локалния адрес се разкрива.'
        networkPredictionEnabled:
            label: Мрежово прогнозиране
            description: 'Ако е включено, $1 се опитва да ускори сърфирането ви, като предварително разрешава DNS записи и превантивно отваря TCP и SSL връзки към сървъри. Тази настройка засяга само действия, предприети от вътрешната услуга за прогнозиране на $1. Тя не засяга предварителните зареждания или свързвания, инициирани от уеб страници.'
    webrtc:
        default: По подразбиране
        default_public_and_private_interfaces: Публични и частни интерфейси
        default_public_interface_only: Само публичен интерфейс
        disable_non_proxied_udp: Деактивиране на непроксиран UDP
