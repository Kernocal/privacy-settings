extension:
    name: Ovládání soukromí
    description: Spravujte nastavení soukromí prohlížeče.
    description_chrome: Spravujte interní nastavení soukromí Chrome.
    description_edge: Spravujte interní nastavení soukromí Edge.
    chrome_name: Ovládání soukromí Chrome
    edge_name: Ovládání soukromí Edge
sidepanel:
    heading: Interní nastavení soukromí prohlížeče
    disclaimer: 'Upozornění:'
    disclaimerText: Toto rozšíření není spojeno s $1.
    managedText: Veškerá nastavení jsou spravována v rámci prohlížeče pomocí rozhraní browser.privacy API.
    learnMore: Zjistěte více o browser.privacy API
    defaultLabel: 'Výchozí:'
    on: Zapnuto
    off: Vypnuto
settings:
    services:
        label: Služby
        description: 'Nastavení, která zapínají nebo vypínají funkce vyžadující síťové služby třetích stran poskytované $2 a vaším výchozím poskytovatelem vyhledávání.'
        autofillAddressEnabled:
            label: Automatické vyplňování adres
            description: 'Pokud je povoleno, $1 nabízí automatické vyplňování adres a dalších formulářových údajů.'
        autofillCreditCardEnabled:
            label: Automatické vyplňování platebních karet
            description: 'Pokud je povoleno, $1 nabízí automatické vyplňování formulářů platebních karet.'
        passwordSavingEnabled:
            label: Ukládání hesel
            description: 'Pokud je povoleno, správce hesel se vás zeptá, zda chcete hesla uložit.'
        searchSuggestEnabled:
            label: Návrhy vyhledávání
            description: 'Pokud je povoleno, $1 odesílá text, který zadáváte do Omnibox, vašemu výchozímu vyhledávači, který poskytuje predikce webových stránek a vyhledávání, které pravděpodobně doplňují to, co jste dosud napsali.'
        spellingServiceEnabled:
            label: Služba kontroly pravopisu
            description: 'Pokud je povoleno, $1 používá webovou službu k opravě pravopisných chyb.'
        translationServiceEnabled:
            label: Překladatelská služba
            description: 'Pokud je povoleno, $1 nabízí překlad stránek, které nejsou v jazyce, kterému rozumíte.'
        safeBrowsingEnabled:
            label: Bezpečné prohlížení
            description: 'Pokud je povoleno, $1 se snaží vás co nejlépe chránit před phishingem a malwarem.'
        safeBrowsingExtendedReportingEnabled:
            label: Rozšířené hlášení bezpečného prohlížení
            description: 'Pokud je povoleno, $1 odešle další informace $2, když SafeBrowsing zablokuje stránku, například obsah zablokované stránky.'
        alternateErrorPagesEnabled:
            label: Alternativní chybové stránky
            description: 'Pokud je povoleno, $1 používá webovou službu k řešení chyb navigace.'
    websites:
        label: Webové stránky
        description: 'Nastavení, která určují, jaké informace $1 zpřístupňuje webovým stránkám.'
        doNotTrackEnabled:
            label: Nesledovat
            description: "Pokud je povoleno, $1 odesílá hlavičku 'Do Not Track' (DNT: 1) s vašimi požadavky."
        thirdPartyCookiesAllowed:
            label: Povoleny soubory cookie třetích stran
            description: 'Pokud je zakázáno, $1 blokuje webům třetích stran nastavování souborů cookie. Rozšíření nemohou toto API povolit v režimu Incognito, kde jsou soubory cookie třetích stran blokovány a mohou být povoleny pouze na úrovni jednotlivých webů. Pokud se pokusíte nastavit toto API na true v režimu Incognito, vyvolá to chybu. Poznámka: Jednotlivé weby mohou mít přístup k souborům cookie třetích stran i v případě, že toto API vrací false, pokud mají platnou výjimku nebo používají Storage Access API.'
        hyperlinkAuditingEnabled:
            label: Audit hypertextových odkazů
            description: 'Pokud je povoleno, $1 odesílá auditní pingy na žádost webové stránky (<a ping>).'
        protectedContentEnabled:
            label: Chráněný obsah
            description: 'Pokud je povoleno, $1 poskytuje pluginům jedinečné ID pro přehrávání chráněného obsahu.'
        referrersEnabled:
            label: Odkazující stránky
            description: 'Pokud je povoleno, $1 odesílá hlavičky referer s vašimi požadavky.'
    network:
        label: Síť
        description: 'Nastavení ovlivňující způsob, jakým $1 obecně nakládá se síťovými připojeními.'
        webRTCIPHandlingPolicy:
            label: Zásady zpracování IP adres WebRTC
            description: 'Umožňuje uživatelům určit kompromis mezi výkonem médií a soukromím, který ovlivňuje směrování provozu WebRTC a míru odhalení informací o místní adrese.'
        networkPredictionEnabled:
            label: Predikce sítě
            description: 'Pokud je povoleno, $1 se pokouší urychlit prohlížení webu předběžným překladem DNS záznamů a preventivním otevíráním TCP a SSL připojení k serverům. Toto nastavení ovlivňuje pouze akce prováděné interní predikční službou $1. Neovlivňuje prefetche ani preconnecty iniciované webovými stránkami.'
    webrtc:
        default: Výchozí
        default_public_and_private_interfaces: Veřejná a soukromá rozhraní
        default_public_interface_only: Pouze veřejné rozhraní
        disable_non_proxied_udp: Zakázat neproxované UDP
